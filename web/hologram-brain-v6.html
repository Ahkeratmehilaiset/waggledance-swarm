<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaggleDance Swarm AI — Hologram Brain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(circle at 50% 45%, rgba(9,36,72,0.96) 0%, rgba(4,10,20,0.98) 46%, #010206 100%);
      font-family: Inter, Arial, sans-serif;
      color: #dff8ff;
    }

    /* ── Grid layout ─────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: 48px 40px 1fr;
      grid-template-columns: 1fr 400px;
      grid-template-areas:
        "header header"
        "tabs tabs"
        "canvas panel";
      width: 100vw; height: 100vh;
    }
    #app.panel-closed {
      grid-template-columns: 1fr 0px;
      grid-template-areas:
        "header header"
        "tabs tabs"
        "canvas canvas";
    }

    /* ── Header ──────────────────────────────────── */
    .header {
      grid-area: header;
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      background: rgba(4,12,24,0.72);
      border-bottom: 1px solid rgba(110,220,255,0.12);
      z-index: 5;
    }
    .header .brand { font-size: 15px; font-weight: 700; color: #a8efff; white-space: nowrap; }
    .header .subtitle { font-size: 11px; color: rgba(200,230,244,0.7); white-space: nowrap; }
    .header .spacer { flex: 1; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 999px; font-size: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(235,247,255,0.92);
    }
    .badge .bdot {
      width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto;
    }
    .lang-toggle {
      appearance: none; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06); color: #dff8ff;
      padding: 3px 8px; border-radius: 999px; font-size: 11px;
      cursor: pointer;
    }
    .profile-select {
      appearance: none; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06); color: #dff8ff;
      padding: 3px 8px; border-radius: 999px; font-size: 11px;
      cursor: pointer;
    }
    .profile-select option { background: #0a1628; color: #dff8ff; }

    /* ── Tab bar ──────────────────────────────────── */
    .tab-bar {
      grid-area: tabs;
      display: flex; align-items: center; gap: 2px;
      padding: 0 12px; overflow-x: auto;
      background: rgba(4,12,24,0.54);
      border-bottom: 1px solid rgba(110,220,255,0.10);
      z-index: 4;
    }
    .tab-btn {
      appearance: none; border: none;
      background: transparent; color: rgba(225,244,255,0.72);
      padding: 8px 14px; font-size: 12px; cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 120ms, border-color 120ms;
      white-space: nowrap;
    }
    .tab-btn:hover { color: rgba(225,244,255,0.92); }
    .tab-btn.active {
      color: #dff8ff;
      border-bottom-color: rgba(90,220,255,0.6);
    }

    /* ── Canvas ───────────────────────────────────── */
    .canvas-area {
      grid-area: canvas;
      position: relative; overflow: hidden;
    }
    .canvas-area canvas {
      display: block; width: 100%; height: 100%;
    }

    /* ── Docked panel ─────────────────────────────── */
    .panel {
      grid-area: panel;
      display: flex; flex-direction: column;
      background: rgba(4,12,24,0.62);
      border-left: 1px solid rgba(110,220,255,0.12);
      overflow: hidden;
      z-index: 3;
    }
    #app.panel-closed .panel { display: none; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(110,220,255,0.08);
    }
    .panel-header h3 { font-size: 14px; color: #d7f6ff; }
    .panel-close {
      appearance: none; border: 0;
      background: rgba(255,255,255,0.08); color: #d7f6ff;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; font-size: 14px;
    }
    .panel-body {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      font-size: 12px; line-height: 1.5;
      color: rgba(220,244,255,0.86);
    }
    .panel-toolbar {
      display: flex; gap: 6px; align-items: center;
      padding: 8px 14px;
      border-top: 1px solid rgba(110,220,255,0.08);
    }
    .panel-toolbar button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: rgba(235,247,255,0.92);
      padding: 5px 10px; border-radius: 999px;
      font-size: 11px; cursor: pointer;
    }
    .panel-status {
      font-size: 11px; color: rgba(200,230,244,0.6);
      margin-left: auto;
    }

    /* ── Panel content helpers ────────────────────── */
    .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .p-card {
      border-radius: 10px; padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .p-card .k { display: block; font-size: 10px; color: rgba(200,230,244,0.6); margin-bottom: 3px; }
    .p-card .v { display: block; font-size: 12px; color: rgba(240,248,255,0.94); word-break: break-word; }
    .p-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .p-list-item {
      padding: 7px 10px; border-radius: 8px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 12px; color: rgba(235,247,255,0.92);
    }
    .p-section { margin-top: 12px; }
    .p-section-title { font-size: 11px; font-weight: 600; color: rgba(200,230,244,0.8); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .p-bar-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); margin-top: 3px; }
    .p-bar-fill { height: 100%; border-radius: 3px; }

    /* ── State badge colors ───────────────────────── */
    .state-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }
    .state-active { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .state-idle { background: #22c55e; opacity: 0.5; }
    .state-training { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; animation: pulse-badge 1.5s infinite; }
    .state-framework { background: transparent; border: 1px dashed rgba(255,255,255,0.3); }
    .state-unwired { background: #6b7280; }
    .state-unavailable { background: #374151; }
    .state-failed { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    @keyframes pulse-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ── Inspector (bottom-right overlay on node click) */
    .inspector {
      position: absolute; right: 12px; bottom: 12px;
      width: min(340px, calc(100% - 24px));
      padding: 12px 14px; border-radius: 14px;
      background: rgba(4,12,24,0.72);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      z-index: 6; font-size: 12px;
    }
    .inspector.hidden { display: none; }
    .inspector h4 { font-size: 14px; color: #d7f6ff; margin-bottom: 4px; }
    .inspector .sub { font-size: 11px; color: rgba(220,244,255,0.7); margin-bottom: 6px; }
    .inspector .close-btn {
      position: absolute; top: 8px; right: 8px;
      border: 0; background: rgba(255,255,255,0.08);
      color: #d7f6ff; width: 24px; height: 24px;
      border-radius: 50%; cursor: pointer; font-size: 12px;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .chip {
      padding: 2px 7px; border-radius: 999px; font-size: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(235,247,255,0.92);
    }

    /* ── Chat panel ───────────────────────────────── */
    .chat-messages {
      flex: 1; overflow-y: auto; display: flex;
      flex-direction: column; gap: 6px; padding-bottom: 8px;
    }
    .chat-msg {
      padding: 6px 10px; border-radius: 8px; font-size: 12px;
      line-height: 1.4; max-width: 90%; word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: rgba(90,220,255,0.14);
      border: 1px solid rgba(90,220,255,0.2);
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .chat-msg.system {
      align-self: center; text-align: center;
      color: rgba(200,230,244,0.6); font-style: italic;
    }
    .chat-input-row {
      display: flex; gap: 6px; padding-top: 8px;
      border-top: 1px solid rgba(110,220,255,0.08);
    }
    .chat-input {
      flex: 1; appearance: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #dff8ff; padding: 6px 10px;
      border-radius: 8px; font-size: 12px; font-family: inherit;
    }
    .chat-input:disabled { opacity: 0.4; }
    .chat-send {
      appearance: none;
      background: rgba(90,220,255,0.18);
      border: 1px solid rgba(90,220,255,0.3);
      color: #dff8ff; padding: 6px 12px;
      border-radius: 8px; font-size: 12px; cursor: pointer;
    }
    .chat-send:disabled { opacity: 0.4; cursor: default; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 900px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: 48px 40px 1fr 40%;
        grid-template-areas:
          "header"
          "tabs"
          "canvas"
          "panel";
      }
      #app.panel-closed {
        grid-template-columns: 1fr;
        grid-template-rows: 48px 40px 1fr;
        grid-template-areas:
          "header"
          "tabs"
          "canvas";
      }
      .panel { border-left: none; border-top: 1px solid rgba(110,220,255,0.12); }
    }
  </style>
</head>

function t(path) {
  const parts = path.split('.');
  let obj = LANG[currentLang];
  for (const p of parts) {
    if (!obj) return path;
    obj = obj[p];
  }
  return obj !== undefined ? obj : path;
}

function localizeProfile(raw) {
  const key = (raw || '').toLowerCase();
  return LANG[currentLang].profiles[key] || LANG[currentLang].profiles.custom;
}

function localizeState(state) {
  return (LANG[currentLang].node_states || {})[state] || state || '';
}

function localizeSourceClass(sc) {
  return (LANG[currentLang].source_classes || {})[sc] || sc || '';
}

function localizeDevice(dev) {
  return (LANG[currentLang].devices || {})[dev] || dev || '';

// ═══════════════════════════════════════════════════════════════
// Canvas 3D renderer
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const area = document.querySelector('.canvas-area');
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const w = area.clientWidth;
  const h = area.clientHeight;
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

const TAU = Math.PI * 2;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const ease = t => t * t * (3 - 2 * t);

function rotateY(p, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
}
function rotateX(p, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
}
function project(p, camDist, scale) {
  const d = camDist / (camDist - p.z);
  return { x: p.x * d * scale, y: p.y * d * scale, depth: d };
}
function rgba(rgb, a) { return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`; }

function glowCircle(x, y, radius, rgb, alpha) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0, rgba(rgb, alpha));
  g.addColorStop(0.4, rgba(rgb, alpha * 0.45));
  g.addColorStop(1, rgba(rgb, 0));
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, TAU);
  ctx.fill();
}

function neonLine(x1, y1, x2, y2, rgb, alpha, width) {
  ctx.save();
  ctx.strokeStyle = rgba(rgb, alpha);
  ctx.lineWidth = width;
  ctx.shadowBlur = 14;
  ctx.shadowColor = rgba(rgb, alpha);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// Brain system
// ═══════════════════════════════════════════════════════════════
class HolographicBrainSystem {
  constructor() {
    this.cameraDistance = 700;
    this.scale = 2.4;
    this.rotationY = 0;
    this.rotationX = -0.1;
    this.rotationDrift = 0.08;
    this.lastExternalUpdate = 0;

    this.shellPoints = [];
    this.shellLines = [];
    this.internalCurves = [];
    this.particles = [];
    this.causalEvents = [];
    this.lastProjectedNodes = [];
    this.selectedNodeId = null;
    this.nodeMeta = {};

    this.nodes = NODE_DEFS.map(d => ({
      ...d, activity: 0.0, baseActivity: 0.0
    }));

    this.edges = EDGE_DEFS.map(d => ({
      ...d, weight: 0.6, signal: 0.0
    }));

    this.buildShell();
    this.initParticles();
  }

  buildShell() {
    const profile = [];
    const profileCount = 52;
    for (let i = 0; i < profileCount; i++) {
      const t = i / (profileCount - 1);
      const a = t * TAU;
      let x = Math.cos(a) * 136;
      let y = Math.sin(a) * 94;
      if (x < 0) x *= 1.1;
      if (x > 50) x *= 0.92;
      if (y < -10) y *= 1.08;
      if (y > 0) y *= 0.72;
      if (x > 72 && y > 20) { x -= 10; y += 22; }
      if (x < -90 && y > -10) y -= 6;
      profile.push({ x, y });
    }
    const layers = 12;
    for (let zi = 0; zi < layers; zi++) {
      const zt = zi / (layers - 1);
      const z = lerp(-72, 72, zt);
      const squash = 1 - Math.pow(Math.abs(z) / 80, 1.75) * 0.56;
      for (const p of profile) this.shellPoints.push({ x: p.x, y: p.y * squash, z });
    }
    for (let zi = 0; zi < layers; zi++) {
      const off = zi * profile.length;
      for (let i = 0; i < profile.length; i++) this.shellLines.push([off + i, off + ((i+1) % profile.length)]);
    }
    for (let zi = 0; zi < layers - 1; zi++) {
      const aOff = zi * profile.length, bOff = (zi+1) * profile.length;
      for (let i = 0; i < profile.length; i += 2) this.shellLines.push([aOff + i, bOff + i]);
    }
    for (let row = 0; row < 7; row++) {
      const pts = [];
      for (let i = 0; i < 20; i++) {
        const t = i / 19;
        pts.push({
          x: lerp(-98, 104, t),
          y: Math.sin(t * TAU * 0.9 + row * 0.7) * 12 + lerp(-56, 34, row / 6),
          z: Math.cos(t * TAU * 0.6 + row * 0.8) * 17
        });
      }
      this.internalCurves.push(pts);
    }
  }

  initParticles() {
    for (let i = 0; i < 140; i++) {
      this.particles.push({
        x: Math.random() * 2000, y: Math.random() * 1200,
        r: Math.random() * 2 + 0.5, speed: Math.random() * 0.12 + 0.02,
        phase: Math.random() * TAU
      });
    }
  }

  transformed(p) {
    return rotateX(rotateY(p, this.rotationY), this.rotationX);
  }

  getNodeById(id) { return this.nodes.find(n => n.id === id); }

  update(dt, now) {
    this.rotationY += dt * this.rotationDrift;
    const t = now * 0.001;
    const idleMix = this.lastExternalUpdate && now - this.lastExternalUpdate < 500 ? 0.15 : 1;

    this.nodes.forEach((node, i) => {
      const wave = 0.06 * Math.sin(t * 1.2 + i * 0.9) + 0.03 * Math.sin(t * 2.3 + i * 1.7);
      const target = clamp(node.activity * (1 - 0.12 * idleMix) + wave * 0.12 * idleMix, 0, 1);
      node.activity = lerp(node.activity, target, 0.06);
    });

    this.edges.forEach((edge, i) => {
      const from = this.getNodeById(edge.from);
      const to = this.getNodeById(edge.to);
      if (!from || !to) return;
      const coupling = (from.activity + to.activity) * 0.5;
      const drift = 0.06 * Math.sin(t * 2 + i * 0.8);
      edge.signal = clamp(lerp(edge.signal, coupling * edge.weight + drift, 0.04), 0, 1);
    });

    if (Math.random() < 0.025) this.spawnCausalEvent(now);
  }

  spawnCausalEvent(now, fromId, toId) {
    const edge = fromId && toId
      ? this.edges.find(e => e.from === fromId && e.to === toId)
      : this.edges[Math.floor(Math.random() * this.edges.length)];
    if (!edge) return;
    this.causalEvents.push({ edge, progress: 0, speed: 0.18 + edge.signal * 0.6, born: now });
  }

  updateBrainState(data = {}) {
    const now = performance.now();
    this.lastExternalUpdate = now;

    if (data.nodes) {
      Object.entries(data.nodes).forEach(([id, value]) => {
        const node = this.getNodeById(id);
        if (node) node.activity = clamp(Number(value) || 0, 0, 1);
      });
    }
    if (data.edges) {
      Object.entries(data.edges).forEach(([key, value]) => {
        const [from, to] = key.split('->');
        const edge = this.edges.find(e => e.from === from && e.to === to);
        if (edge) edge.signal = clamp(Number(value) || 0, 0, 1);
      });
    }
    if (Array.isArray(data.events)) {
      data.events.forEach(evt => this.spawnCausalEvent(now, evt.from, evt.to));
    }
    if (data.node_meta) {
      this.nodeMeta = data.node_meta;
    }
  }

  drawBackground(now, w, h) {
    const t = now * 0.001;
    for (const p of this.particles) {
      const y = (p.y + t * 6 * p.speed + Math.sin(t + p.phase) * 0.2) % (h + 40);
      glowCircle(p.x % w, y - 20, p.r * 3, [80,170,255], 0.04);
    }
  }

  drawRingOrbitals(cx, cy) {
    // Draw faint orbital ring paths
    for (const [ringName, rgb] of Object.entries(RING_COLORS)) {
      const ringNodes = this.nodes.filter(n => n.ring === ringName);
      if (ringNodes.length < 2) continue;
      const projected = ringNodes.map(n => {
        const q = this.transformed(n.pos);
        const s = project(q, this.cameraDistance, this.scale);
        return { x: cx + s.x, y: cy + s.y };
      });
      ctx.save();
      ctx.strokeStyle = rgba(rgb, 0.08);
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      projected.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }
  }

  getStateBadgeColor(state) {
    const map = {
      active: '#4ade80', idle: 'rgba(34,197,94,0.5)', training: '#f59e0b',
      framework: 'rgba(255,255,255,0.2)', unwired: '#6b7280',
      unavailable: '#374151', failed: '#ef4444'
    };
    return map[state] || '#374151';
  }

  render(now) {
    const area = document.querySelector('.canvas-area');
    const w = area.clientWidth, h = area.clientHeight;
    ctx.clearRect(0, 0, w, h);
    const cx = w * 0.5, cy = h * 0.5;

    this.drawBackground(now, w, h);

    // Shell
    const shellProjected = this.shellPoints.map(p => {
      const q = this.transformed(p);
      const s = project(q, this.cameraDistance, this.scale);
      return { x: cx + s.x, y: cy + s.y, z: q.z, depth: s.depth };
    });
    for (const [ia, ib] of this.shellLines) {
      const a = shellProjected[ia], b = shellProjected[ib];
      const alpha = clamp(0.04 + (a.depth + b.depth) * 0.12, 0.03, 0.2);
      neonLine(a.x, a.y, b.x, b.y, [90,220,255], alpha, 0.8);
    }
    for (const curve of this.internalCurves) {
      for (let i = 0; i < curve.length - 1; i++) {
        const a = project(this.transformed(curve[i]), this.cameraDistance, this.scale);
        const b = project(this.transformed(curve[i+1]), this.cameraDistance, this.scale);
        neonLine(cx + a.x, cy + a.y, cx + b.x, cy + b.y, [100,170,255], 0.06, 0.8);
      }
    }

    // Ring orbitals
    this.drawRingOrbitals(cx, cy);

    // Nodes
    const transformedNodes = this.nodes.map(node => {
      const q = this.transformed(node.pos);
      const s = project(q, this.cameraDistance, this.scale);
      return { ...node, sx: cx + s.x, sy: cy + s.y, z: q.z, depth: s.depth };
    });
    const nodeMap = Object.fromEntries(transformedNodes.map(n => [n.id, n]));
    this.lastProjectedNodes = transformedNodes.map(n => ({ id: n.id, x: n.sx, y: n.sy, r: n.size * 1.6 }));

    // Edges
    this.edges.forEach((edge, i) => {
      const a = nodeMap[edge.from], b = nodeMap[edge.to];
      if (!a || !b) return;
      const alpha = 0.08 + edge.signal * 0.35;
      const width = 0.8 + edge.signal * 2;
      neonLine(a.sx, a.sy, b.sx, b.sy, edge.rgb, alpha, width);
      // Flowing particles
      const phase = ((now * 0.0003 * (0.5 + edge.signal)) + i * 0.07) % 1;
      const px = lerp(a.sx, b.sx, phase), py = lerp(a.sy, b.sy, phase);
      glowCircle(px, py, 3 + edge.signal * 6, edge.rgb, 0.15 + edge.signal * 0.25);
    });

    // Causal events
    this.causalEvents = this.causalEvents.filter(evt => now - evt.born < 2400);
    this.causalEvents.forEach(evt => {
      const a = nodeMap[evt.edge.from], b = nodeMap[evt.edge.to];
      if (!a || !b) return;
      evt.progress += evt.speed * 0.012;
      const p = ease(clamp(evt.progress, 0, 1));
      const px = lerp(a.sx, b.sx, p), py = lerp(a.sy, b.sy, p);
      glowCircle(px, py, 14, evt.edge.rgb, 0.4);
      glowCircle(px, py, 6, [255,255,255], 0.85);
    });

    // Render nodes (sorted by z for depth)
    transformedNodes.sort((a, b) => a.z - b.z).forEach((node, i) => {
      const pulse = 0.85 + Math.sin(now * 0.003 + i) * 0.15;
      const r = node.size * (0.5 + node.activity * 0.8) * pulse;
      const selected = this.selectedNodeId === node.id;
      const meta = this.nodeMeta[node.id];
      const isUnavailable = meta && meta.state === 'unavailable';
      const opacityMod = isUnavailable ? 0.3 : 1.0;

      if (selected) glowCircle(node.sx, node.sy, r * 3, [255,255,255], 0.16);
      glowCircle(node.sx, node.sy, r * 2.2, node.rgb, (0.18 + node.activity * 0.32) * opacityMod + (selected ? 0.1 : 0));
      glowCircle(node.sx, node.sy, r, node.rgb, (0.7 + node.activity * 0.25) * opacityMod);

      // State badge dot
      if (meta && meta.state && meta.state !== 'idle') {
        const badgeColor = this.getStateBadgeColor(meta.state);
        ctx.save();
        ctx.fillStyle = badgeColor;
        ctx.beginPath();
        ctx.arc(node.sx + r * 0.7, node.sy - r * 0.7, 3, 0, TAU);
        ctx.fill();
        if (meta.state === 'active' || meta.state === 'failed') {
          ctx.shadowBlur = 6;
          ctx.shadowColor = badgeColor;
          ctx.beginPath();
          ctx.arc(node.sx + r * 0.7, node.sy - r * 0.7, 3, 0, TAU);
          ctx.fill();
        }
        ctx.restore();
      }

      // Source class halo (simulated = orange ring)
      if (meta && meta.source_class === 'simulated') {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,160,40,0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(node.sx, node.sy, r * 1.6, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      // Stale indicator
      if (meta && meta.freshness_s > STALE_THRESHOLD_S) {
        ctx.save();
        ctx.strokeStyle = 'rgba(250,204,21,0.4)';
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 3]);
        ctx.beginPath();
        ctx.arc(node.sx, node.sy, r * 1.8, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      // Label
      ctx.save();
      ctx.fillStyle = `rgba(240,248,255,${(0.5 + node.activity * 0.4) * opacityMod})`;
      ctx.font = `${node.ring === 'core' ? 11 : 9}px Inter,Arial,sans-serif`;
      ctx.fillText(node.short, node.sx + r + 4, node.sy - 3);
      ctx.restore();
    });

    // Shell vertex dots
    shellProjected.forEach((p, i) => {
      if (i % 5 === 0) glowCircle(p.x, p.y, 1.8, [120,235,255], 0.06);
    });
  }
}

  hologram: null,
  ws: { connected: false, lastMessageAt: 0 }
};

let isAuthenticated = false;
let profilePendingRestart = false;  // Set after user changes profile; prevents polling from resetting selector

async function checkAuth() {
  try {
    const res = await fetch('/api/auth/check', { credentials: 'same-origin' });
    const data = await res.json();
    isAuthenticated = data.authenticated === true;
  } catch { isAuthenticated = false; }
}

async function fetchPublicJson(url) {
  try {
    const r = await fetch(url, { credentials: 'same-origin' });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function refreshDashboardData() {
  const results = await Promise.allSettled([
    fetchPublicJson('/api/status'),
    fetchPublicJson('/api/system'),
    fetchPublicJson('/api/consciousness'),
    fetchPublicJson('/api/learning'),
    fetchPublicJson('/api/micro_model'),
    fetchPublicJson('/api/ops'),
    fetchPublicJson('/api/feeds'),
    fetchPublicJson('/api/profile/impact'),
    fetchPublicJson('/api/capabilities/state'),
    fetchPublicJson('/api/learning/state-machine'),
  ]);
  const keys = ['status','system','consciousness','learning','micro_model','ops','feeds','profile_impact','capabilities_state','learning_state'];
  keys.forEach((k, i) => {
    if (results[i].status === 'fulfilled' && results[i].value) {
      dashboardState[k] = results[i].value;
    }
  });
  updateHeaderBadges();
  buildActivePanel();
}

// ═══════════════════════════════════════════════════════════════
// Header badges
// ═══════════════════════════════════════════════════════════════
function updateHeaderBadges() {
  const st = dashboardState.status;
  if (st) {
    // Sync profile selector with backend state (skip if user has a pending change)
    const sel = document.getElementById('profileSelect');
    const activeProfile = (st.profile || 'home').toLowerCase();
    if (sel && !profilePendingRestart && sel.value !== activeProfile) sel.value = activeProfile;
    // Localize option labels
    if (sel) {
      for (const opt of sel.options) {
        opt.textContent = localizeProfile(opt.value);
      }
    }
    const rtText = st.status === 'running' ? (st.uptime_s > 0 ? `${Math.floor(st.uptime_s/60)}m` : 'OK') : st.status;
    document.getElementById('badgeRuntimeText').textContent = rtText;
  }
  // Compute badge from hologram node_meta
  const holo = dashboardState.hologram;
  if (holo && holo.node_meta && holo.node_meta.sys_compute) {
    const cm = holo.node_meta.sys_compute;
    const dev = cm.device || 'CPU';
    const stateLabel = cm.state === 'active'
      ? (dev + ' ' + localizeState('active'))
      : (dev + ' ' + localizeState(cm.state || 'idle'));
    document.getElementById('badgeComputeText').textContent = stateLabel;
  }
}

function applyLanguage() {
  document.getElementById('brandTitle').textContent = t('brand');
  document.getElementById('brandSubtitle').textContent = t('subtitle');
  const tabs = LANG[currentLang].tabs;
  document.getElementById('tabOverview').textContent = tabs.overview;
  document.getElementById('tabMemory').textContent = tabs.memory;
  document.getElementById('tabReasoning').textContent = tabs.reasoning;
  document.getElementById('tabMicro').textContent = tabs.micro;
  document.getElementById('tabLearning').textContent = tabs.learning;
  document.getElementById('tabFeeds').textContent = tabs.feeds;
  document.getElementById('tabOps').textContent = tabs.ops;
  document.getElementById('tabChat').textContent = tabs.chat;
  document.getElementById('langToggle').textContent = currentLang === 'en' ? 'FI' : 'EN';
  document.getElementById('panelRefresh').textContent = t('refresh');
  updateHeaderBadges();
  buildActivePanel();
}

document.getElementById('langToggle').addEventListener('click', () => {
  currentLang = currentLang === 'en' ? 'fi' : 'en';
  applyLanguage();
});

document.getElementById('profileSelect').addEventListener('change', async (e) => {
  const profile = e.target.value;
  const status = document.getElementById('panelStatus');
  try {
    const res = await fetch('/api/profiles/active', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ profile }),
    });
    if (res.ok) {
      // Profile is persisted but runtime uses it only after restart
      profilePendingRestart = true;
      if (status) status.textContent = t('profile.restart_notice');
    } else {
      if (status) status.textContent = t('profile.switch_failed');
    }
  } catch {
    if (status) status.textContent = t('profile.switch_failed');
  }
});

let activeTab = 'overview';

function setActiveTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('app').classList.remove('panel-closed');
  buildActivePanel();
}

document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  if (tab === activeTab) {
    // Toggle panel closed
    document.getElementById('app').classList.toggle('panel-closed');
    resizeCanvas();
    return;
  }
  setActiveTab(tab);
  resizeCanvas();
});

document.getElementById('panelClose').addEventListener('click', () => {
  document.getElementById('app').classList.add('panel-closed');
  resizeCanvas();
});

document.getElementById('panelRefresh').addEventListener('click', refreshDashboardData);

// Panel builders
// ═══════════════════════════════════════════════════════════════
function fmt(value, fallback) {
  if (fallback === undefined) fallback = '\u2014';
  if (value === null || value === undefined || value === '') return fallback;
  if (typeof value === 'number') return Number.isInteger(value) ? String(value) : value.toFixed(3);
  return String(value);
}

function card(key, val) {
  return `<div class="p-card"><span class="k">${key}</span><span class="v">${fmt(val)}</span></div>`;
}

function stateDot(state) {
  return `<span class="state-dot state-${state || 'unavailable'}"></span>${localizeState(state)}`;
}

function qualityBar(q) {
  if (q === null || q === undefined) return '';
  const pct = Math.round(q * 100);
  const color = q > 0.7 ? '#4ade80' : q > 0.4 ? '#f59e0b' : '#ef4444';
  return `<div class="p-bar-track"><div class="p-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <span style="font-size:10px;color:rgba(200,230,244,0.6)">${t('inspector.quality')}: ${pct}%</span>`;
}

function buildActivePanel() {
  const title = document.getElementById('panelTitle');
  const body = document.getElementById('panelBody');
  const status = document.getElementById('panelStatus');
  title.textContent = t(`tabs.${activeTab}`);
  status.textContent = new Date().toLocaleTimeString();

  const builders = {
    overview: buildOverviewPanel,
    memory: buildMemoryPanel,
    reasoning: buildReasoningPanel,
    micro: buildMicroPanel,
    learning: buildLearningPanel,
    feeds: buildFeedsPanel,
    ops: buildOpsPanel,
    chat: buildChatPanel,
  };
  (builders[activeTab] || buildOverviewPanel)(body);
}

function _feedTypeLabel(type) {
  const map = { weather: '\u2601 Weather', electricity: '\u26a1 Electricity', rss: '\ud83d\udcf0 News/RSS' };
  return map[type] || type;
}

function _freshnessLabel(s) {
  if (s == null) return null;
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.round(s / 60)}min ago`;
  return `${Math.round(s / 3600)}h ago`;
}

function buildFeedsPanel(el) {
  const f = dashboardState.feeds || {};
  const sources = f.sources || [];
  let html = '';

  // Summary with type breakdown
  const byType = {};
  sources.forEach(s => { byType[s.type] = (byType[s.type] || 0) + 1; });
  const withData = sources.filter(s => s.items_count > 0).length;

  html += `<div class="p-section"><div class="p-section-title">${t('feeds.title')}</div>`;
  html += `<div class="p-grid">`;
  html += card(t('feeds.enabled_label'), f.enabled ? t('feeds.yes') : t('feeds.no'));
  html += card(t('feeds.source_count'), `${sources.length} (${withData} with data)`);
  for (const [type, count] of Object.entries(byType)) {
    html += card(_feedTypeLabel(type), count);
  }
  html += `</div></div>`;

  if (sources.length) {
    html += `<div class="p-section"><div class="p-section-title">${t('feeds.sources_title')}</div>`;
    html += `<div class="p-list">`;
    sources.forEach(s => {
      const stateColor = {
        active:'#22c55e', idle:'#94a3b8', framework:'#f59e0b',
        unwired:'#6b7280', unavailable:'#374151', failed:'#ef4444',
      }[s.state] || '#6b7280';

      html += `<div class="p-list-item" style="display:flex;align-items:center;gap:8px">`;
      html += `<span style="width:8px;height:8px;border-radius:50%;background:${stateColor};flex-shrink:0"></span>`;
      html += `<div style="flex:1">`;
      html += `<strong>${escapeHtml(s.name)}</strong>`;
      html += ` <span style="opacity:0.5;font-size:0.85em">${escapeHtml(s.protocol)}</span>`;
      if (s.provider) html += ` <span style="opacity:0.4;font-size:0.8em">(${escapeHtml(s.provider)})</span>`;
      html += `<div style="opacity:0.6;font-size:0.85em">`;
      html += `${t('node_states.' + s.state)}`;
      html += ` \u00b7 ${s.interval_min}min interval`;
      if (s.critical) html += ` \u00b7 <span style="color:#f87171">${t('feeds.critical')}</span>`;
      html += `</div>`;

      // Data section — always show, truthful about what's available
      html += `<div style="margin-top:4px;font-size:0.85em">`;
      if (s.items_count > 0) {
        html += `<span style="color:#4ade80">${s.items_count} items</span>`;
        const fresh = _freshnessLabel(s.freshness_s);
        if (fresh) {
          const stale = s.freshness_s > FEED_STALE_THRESHOLD_S;
          html += ` \u00b7 <span style="color:${stale ? '#facc15' : 'rgba(220,244,255,0.7)'}">`;
          html += `${fresh}${stale ? ' \u26a0' : ''}</span>`;
        }
      } else {
        html += `<span style="opacity:0.4">${t('no_data')}</span>`;
      }
      html += `</div>`;

      // Latest items (RSS)
      if (s.latest_items && s.latest_items.length) {
        html += `<div style="margin-top:4px;font-size:0.8em;opacity:0.7">`;
        s.latest_items.slice(0, 3).forEach(item => {
          html += `<div>\u00b7 ${escapeHtml(item.title || item.text || '')}</div>`;
        });
        html += `</div>`;
      }

      // Latest value (weather, electricity)
      if (s.latest_value) {
        html += `<div style="margin-top:4px;font-size:0.85em;color:#a8efff">`;
        if (s.type === 'weather') {
          const v = s.latest_value;
          if (v.temp_c != null) html += `${v.temp_c}\u00b0C`;
          if (v.wind_ms != null) html += `, ${v.wind_ms} m/s`;
          if (v.humidity_pct != null) html += `, ${v.humidity_pct}% RH`;
        }
        if (s.type === 'electricity') {
          const v = s.latest_value;
          if (v.price_c_kwh != null) html += `${v.price_c_kwh} c/kWh`;
          if (v.type) html += ` (${v.type})`;
        }
        html += `</div>`;
      }

      if (s.last_error) {
        html += `<div style="margin-top:2px;font-size:0.8em;color:#f87171">${escapeHtml(s.last_error)}</div>`;
      }
      html += `</div></div>`;
    });
    html += `</div></div>`;
  }

  if (f.critical_alerts && f.critical_alerts.length) {
    html += `<div class="p-section"><div class="p-section-title">${t('sections.overview_alerts')}</div><div class="p-list">`;
    f.critical_alerts.forEach(a => {
      html += `<div class="p-list-item" style="color:#f87171">${escapeHtml(a)}</div>`;
    });
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

let chatMessages = [];
let chatRouteInfo = null;

function _renderChatMessages(container, hasAuth) {
  let html = '';
  if (!hasAuth) {
    html += `<div class="chat-msg system">${t('chat.no_auth')}</div>`;
  }
  chatMessages.forEach(m => {
    html += `<div class="chat-msg ${m.role}">${escapeHtml(m.text)}</div>`;
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function buildChatPanel(el) {
  const hasAuth = isAuthenticated;
  const existingInput = el.querySelector('#chatInput');
  const inputHasFocus = existingInput && document.activeElement === existingInput;

  // If user is actively typing, only update messages — never destroy the input
  if (inputHasFocus) {
    const messagesEl = el.querySelector('#chatMessages');
    if (messagesEl) {
      _renderChatMessages(messagesEl, hasAuth);
      return;
    }
  }

  let html = '';

  // Route explainability section
  if (chatRouteInfo) {
    html += `<div class="p-section"><div class="p-section-title">${t('chat.route_label')}</div>`;
    html += `<div class="p-grid">`;
    html += card(t('chat.route_label'), chatRouteInfo.source || '\u2014');
    html += card(t('chat.confidence_label'), chatRouteInfo.confidence != null ? (chatRouteInfo.confidence * 100).toFixed(0) + '%' : '\u2014');
    html += `</div></div>`;
  }

  html += `<div class="chat-messages" id="chatMessages"></div>`;
  html += `<div class="chat-input-row">`;
  html += `<input class="chat-input" id="chatInput" type="text"
    placeholder="${hasAuth ? t('chat.placeholder') : t('chat.placeholder_disabled')}"
    ${hasAuth ? '' : 'disabled'} />`;
  html += `<button class="chat-send" id="chatSend" ${hasAuth ? '' : 'disabled'}>${t('chat.send')}</button>`;
  html += `</div>`;
  el.innerHTML = html;

  // Render messages into their container
  _renderChatMessages(document.getElementById('chatMessages'), hasAuth);

  // Restore saved input value if there was one
  const input = document.getElementById('chatInput');
  if (input && existingInput && existingInput.value) {
    input.value = existingInput.value;
  }

  // Attach event handlers
  const sendBtn = document.getElementById('chatSend');
  if (input && hasAuth) {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
    sendBtn.addEventListener('click', sendChat);
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function sendChat() {
  if (!isAuthenticated) return;
  const input = document.getElementById('chatInput');
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chatMessages.push({ role: 'user', text: msg });
  buildActivePanel();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ query: msg }),
    });
    if (res.ok) {
      const data = await res.json();
      chatMessages.push({ role: 'assistant', text: data.response || '' });
      chatRouteInfo = { source: data.source, confidence: data.confidence, agent_id: data.agent_id };
      if (data.source) highlightChatRoute(data.source, 3000);
    } else {
      chatMessages.push({ role: 'system', text: `Error: ${res.status}` });
    }
  } catch (e) {
    chatMessages.push({ role: 'system', text: 'Connection error' });
  }
  buildActivePanel();
}

function highlightChatRoute(source, durationMs) {
  // Highlight the route source node briefly
  const nid = source.replace(/\./g, '_');
  const prev = brain.selectedNodeId;
  brain.selectedNodeId = nid;
  setTimeout(() => { if (brain.selectedNodeId === nid) brain.selectedNodeId = prev; }, durationMs);
}

// ═══════════════════════════════════════════════════════════════
// Inspector — node click
// ═══════════════════════════════════════════════════════════════
function showInspector(nodeId) {
  const node = brain.getNodeById(nodeId);
  if (!node) return;
  const meta = brain.nodeMeta[nodeId] || {};
  const info = NODE_META_INFO[nodeId] || {};
  const insp = document.getElementById('inspector');
  insp.classList.remove('hidden');
  brain.selectedNodeId = nodeId;

  document.getElementById('inspectorTitle').textContent = `${node.short} \u2014 ${node.label}`;
  document.getElementById('inspectorSub').textContent = info.desc || '';

  let bodyHtml = `<div class="p-grid" style="margin-top:6px">`;
  bodyHtml += card(t('inspector.state'), stateDot(meta.state));
  if (meta.device) bodyHtml += card(t('inspector.device'), localizeDevice(meta.device));
  if (meta.source_class) bodyHtml += card(t('inspector.source'), localizeSourceClass(meta.source_class));
  if (meta.freshness_s != null) {
    const stale = meta.freshness_s > STALE_THRESHOLD_S;
    bodyHtml += card(t('inspector.freshness'), `${meta.freshness_s}s${stale ? ' \u26a0 ' + t('freshness.stale') : ''}`);
  }
  bodyHtml += `</div>`;
  // Quality bar
  if (meta.quality !== null && meta.quality !== undefined) {
    bodyHtml += `<div style="margin-top:8px">${qualityBar(meta.quality)}</div>`;
  }
  bodyHtml += `<div style="margin-top:6px;font-size:10px;color:rgba(200,230,244,0.5)">`;
  bodyHtml += `${t('inspector.connections')}: `;
  bodyHtml += `Layer: ${info.layer || node.ring}`;
  bodyHtml += `</div>`;
  document.getElementById('inspectorBody').innerHTML = bodyHtml;

  // Connection chips
  const incoming = brain.edges.filter(e => e.to === nodeId).map(e => brain.getNodeById(e.from)?.short || e.from);
  const outgoing = brain.edges.filter(e => e.from === nodeId).map(e => brain.getNodeById(e.to)?.short || e.to);
  let chipHtml = '';
  incoming.forEach(s => { chipHtml += `<span class="chip">\u2190 ${s}</span>`; });
  outgoing.forEach(s => { chipHtml += `<span class="chip">${s} \u2192</span>`; });
  document.getElementById('inspectorChips').innerHTML = chipHtml;
}

document.getElementById('inspectorClose').addEventListener('click', () => {
  document.getElementById('inspector').classList.add('hidden');
  brain.selectedNodeId = null;
});

// ═══════════════════════════════════════════════════════════════
// Canvas click detection
// ═══════════════════════════════════════════════════════════════
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let closest = null, closestDist = 999;
  for (const n of brain.lastProjectedNodes) {
    const d = Math.hypot(mx - n.x, my - n.y);
    if (d < n.r * 2 && d < closestDist) {
      closest = n; closestDist = d;
    }
  }
  if (closest) showInspector(closest.id);
});

// ═══════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════
let wsConnection = null;

function connectWebSocket() {
  if (!isAuthenticated) {
    // No WS — use REST polling
    setInterval(pollHologramState, 2000);
    return;
  }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  wsConnection = ws;

  ws.onopen = () => {
    dashboardState.ws.connected = true;
    document.getElementById('panelStatus').textContent = 'WS connected';
  };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      dashboardState.ws.lastMessageAt = Date.now();
      if (msg.type === 'brain_update' && msg.brain) {
        dashboardState.hologram = msg.brain;
        brain.updateBrainState(msg.brain);
        updateHeaderBadges();
      } else if (msg.type === 'system' && msg.data) {
        dashboardState.system = { ...dashboardState.system, ...msg.data };
      } else if (msg.type === 'chat_route' && msg.data) {
        chatRouteInfo = msg.data;
        if (activeTab === 'chat') buildActivePanel();
        if (msg.data.source) highlightChatRoute(msg.data.source, 3000);
      }
    } catch {}
  };
  ws.onclose = () => {
    dashboardState.ws.connected = false;
    wsConnection = null;
    // Reconnect after 5s
    setTimeout(connectWebSocket, 5000);
  };
  ws.onerror = () => ws.close();
}

async function pollHologramState() {
  const data = await fetchPublicJson('/api/hologram/state');
  if (data) {
    dashboardState.hologram = data;
    brain.updateBrainState(data);
    updateHeaderBadges();
  }
}

// ═══════════════════════════════════════════════════════════════
// Demo sequence
// ═══════════════════════════════════════════════════════════════
function _startDemoSequence() {
  const phases = [
    // Phase 1: Idle state
    { delay: 0, nodes: Object.fromEntries(NODE_DEFS.map(n => [n.id, 0.05])) },
    // Phase 2: Perception activates
    { delay: 2000, nodes: { sensory: 0.7, sys_feeds: 0.4, sys_queues: 0.3 } },
    // Phase 3: Memory + LLM
    { delay: 4000, nodes: { waggle_memory: 0.5, working_memory: 0.6, llm_core: 0.8, semantic_memory: 0.4, sys_compute: 0.6 } },
    // Phase 4: Reasoning + Decision
    { delay: 6000, nodes: { reason_layer: 0.7, causal_map: 0.5, decision: 0.6, magma_audit: 0.3, magma_trust: 0.4 } },
    // Phase 5: Learning ring
    { delay: 8000, nodes: { learn_dream: 0.6, learn_training: 0.5, micro_train: 0.4, micro_route: 0.3, learn_canary: 0.2 } },
    // Phase 6: System ring health
    { delay: 10000, nodes: { sys_auth: 1.0, sys_policy: 1.0, sys_api: 0.8, sys_storage: 0.7, sys_websocket: 0.3 } },
    // Phase 7: Settle to light idle
    { delay: 12000, nodes: Object.fromEntries(NODE_DEFS.map(n => [n.id, 0.08 + Math.random() * 0.12])) },
  ];
  phases.forEach(phase => {
    setTimeout(() => brain.updateBrainState({ nodes: phase.nodes }), phase.delay);
  });
}

// ═══════════════════════════════════════════════════════════════
// Init + animation loop
// ═══════════════════════════════════════════════════════════════
const brain = new HolographicBrainSystem();
window.updateBrainState = data => brain.updateBrainState(data);
window.connectBrainSocket = () => connectWebSocket();

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
applyLanguage();

let lastFrameTime = performance.now();
function animate(now) {
  const dt = Math.min((now - lastFrameTime) / 1000, 0.1);
  lastFrameTime = now;
  brain.update(dt, now);
  brain.render(now);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// Initial auth check, then data fetch + WS connect
checkAuth().then(() => {
  refreshDashboardData();
  connectWebSocket();
});

// Start demo if no live data after 3s
setTimeout(() => {
  if (!dashboardState.hologram) _startDemoSequence();
}, 3000);

// Periodic REST refresh (for panels)
setInterval(refreshDashboardData, 10000);
</script>
