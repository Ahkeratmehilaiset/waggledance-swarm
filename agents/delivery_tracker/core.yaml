    year: 2026
    url: https://tulli.fi/henkiloasiakkaat/tilaaminen-ulkomailta
    supports: Tullikynnys, ALV, tullausmaksut, DHL-palvelumaksu.
  - id: src:DT2
    org: Posti Group Oyj
    title: Paketit ja toimitusehdot
    year: 2026
