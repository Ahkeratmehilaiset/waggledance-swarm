# Tuotantolinjan monitorointi — Aikataulutus
# WaggleDance Swarm AI
title: "Tuotannon aikataulutus"
agent: "Tuotantolinjan monitorointi"
facts:
  - "Finite Capacity Scheduling (FCS): todelliset kapasiteettirajoitteet huomioidaan, ei ylioleteta kapasiteettia"
  - "SMED (Single Minute Exchange of Die): asetusajan tavoite alle 10 min, sisäinen aika → ulkoiseksi → eliminoi"
  - "Theory of Constraints (TOC): tunnista pullonkaula (bottleneck), maksimoi sen tuotos, kaikki muut tukevat sitä"
  - "Drum-Buffer-Rope (DBR): pullonkaula on rumpu, puskuri suojaa epävarmuudelta, köysi synkronoi syötön"
  - "Viikkosuunnitelma + päiväkohtainen hienosuunnittelu: viikolle raakasuunnitelma, päivälle tarkat järjestykset"
  - "MES (Manufacturing Execution System): reaaliaikainen tuotantosuunnittelu ja seuranta, integroituu ERP:iin"
  - "ERP-tuotantosuunnittelu (SAP PP, Oracle): MRP-laskelmat, tuotantomääräykset, kapasiteettisuunnitelma"
  - "Takt-aika: asiakaskysyntä / käytettävissä oleva aika — kaikki prosessit synkronoidaan takt-aikaan"
  - "Kanban-ohjaus: visuaalinen korttijärjestelmä, tuotantoa käynnistetään vain todellisen tarpeen mukaan"
  - "Heijunka (tasoituotanto): kuorman tasoittaminen viikolle tai päivälle — vähentää varastoja ja läpimenoaikaa"
  - "OEE-tavoite aikataulutuksessa: tavoite ≥85%, aikatauluun lasketaan suunnitellut pysähdykset erikseen"
  - "Tuotantovahvistusilmoitus (production confirmation): jokaisen tilauksen valmistuminen kirjataan MES/ERP:iin"
  - "Tuplausaika (lead time): toimitusajan minimointi → lyhennä tuotantovaiheita, pienennä eräkokoa, vähennä odottelua"
  - "JIT (Just-In-Time): toimitus juuri oikeaan aikaan, ei yli-inventointia — toimii vakaan kysynnän tuotteille"
  - "Eräkoon optimointi: EOQ-malli tai EPEI (Every Part Every Interval) — vaihtoajan ja varastoinnin tasapaino"
  - "Prioriteettijonon hallinta: FIFO perustila, mutta rush-tilaukset tai kriittiset toimitukset voivat rikkoa FIFO:n"
  - "Kapasiteettisuunnitelma (CRP): tarkistaa onko tuotantosuunnitelma toteutettavissa, tunnistaa ylikuormitus"
  - "Lyhyen aikavälin ennuste: 1–4 viikkoa, perustuu tilauksiin ja trenditietoon, syöttö aikataulutusmoottoriin"
  - "Vuosikalenteri ja seisokit: vuosihuoltoseisokki, juhlapyhät ja loma-ajat huomioitava kapasiteettilaskelmissa"
