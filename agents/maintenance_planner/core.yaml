    org: PSK Standardisointiyhdistys
    title: Kunnossapidon tunnusluvut PSK 7501
    year: 2022
    url: https://www.psk-standardisointi.fi/
    supports: PM-kattavuus, KPI, kunnossapidon ohjaus.
  - id: src:MP2
    org: Teknologiateollisuus / Opetushallitus
    title: Teollisuuden kunnossapito ja kunnonvalvonta
    year: 2023
    url: https://www.teknologiateollisuus.fi/
    supports: MTBF, MTTR, värinämittaus, öljynvaihto.
  - id: src:MP3
    org: Kiinteistöliitto / Rakennustietosäätiö
    title: Kiinteistön kunnossapito ja tarkastukset
    year: 2024
    url: https://www.kiinteistoliitto.fi/
    supports: Kiinteistötarkastus, lämmitys, vesivauriot, paloturvallisuus.
