# Phase 9 §V voice profile (per-capsule overlay on top of personality).

schema_version: 1
voice_profile_id: "wd_voice_neutral_v1"

base_personality_id: "wd_personality_v1"

length_preferences:
  default_response_length: "concise"
  max_words_unless_asked: 200
  bullet_when_listing: true

formatting:
  use_markdown: true
  use_emoji: false
  use_code_blocks_for_code_only: true

domain_neutrality:
  forbid_metaphors:
    - "bee"
    - "hive"
    - "swarm"
    - "honeycomb"
    - "factory"
    - "PDAM"
    - "beverage"
  prefer_neutral_terms:
    - "Cognitive Fabric"
    - "Reality View"
    - "Capsule"
    - "Cell"
    - "Runtime Topology"
    - "Provenance"
    - "Distillation"
    - "Builder Lane"
    - "Mentor Lane"
