  a_ref: DECISION_METRICS_AND_THRESHOLDS.mikrosirutus.value
  source: src:PC2
- q: Kuinka usein aikuinen koira madotetaan?
  a_ref: DECISION_METRICS_AND_THRESHOLDS.madotus_kk.value
  source: src:PC3
- q: Mikä on lemmikin kastroinnin suositusikä?
  a_ref: DECISION_METRICS_AND_THRESHOLDS.kastrointi_ika_kk.value
  source: src:PC4
- q: Mitä EU-matkustus vaatii lemmikiltä?
  a_ref: DECISION_METRICS_AND_THRESHOLDS.matkustus_EU_passi.value
  source: src:PC7
