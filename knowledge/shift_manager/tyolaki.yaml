title: Tyolaki
agent: Vuoropäällikkö
facts:
- 'Säännöllinen työaika: max 8h/vrk, 40h/vko'
- 'Ylityö: työnantajan aloite + työntekijän suostumus, 50%/100%'
- 'Vuorokautinen lepoaika: 11h yhtäjaksoista'
- 'Viikottainen vapaa: 35h yhtäjaksoinen'
FINNISH_LABOR_LAW:
- rule: Päivittäinen enimmäistyöaika
  value: 8h + 4h ylityö
  source: Työaikalaki 872/2019
- rule: Viikoittainen enimmäistyöaika
  value: 40h + 8h ylityö (4kk keskiarvo)
  source: Työaikalaki
- rule: Yövuorolisä
  value: Vähintään 20% korotus tai vastaava vapaana
  source: TES-kohtainen
- rule: Vuorokausilepo
  value: Vähintään 11h keskeytymätön lepo
  source: Työaikalaki
- rule: Viikkolepo
  value: Vähintään 35h keskeytymätön lepo
  source: Työaikalaki
- rule: Ylityön suostumus
  value: Työntekijän suostumus jokaista kertaa varten
  source: Työaikalaki
- rule: Yötyö klo 23-06
  value: Erityiset rajoitukset, terveystarkastus
  source: Työaikalaki
