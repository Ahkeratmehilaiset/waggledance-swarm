header:
  agent_id: wildlife_ranger
  agent_name: Wildlife Ranger
  version: 1.0.0
  last_updated: '2026-02-21'
ASSUMPTIONS:
- Kalibroitu pixel-to-meter mapping (PTZ-kameran asennuskorkeus ja kulma).
- Frigate lähettää 'bear', 'wolf', 'deer', 'dog' luokittelut.
DECISION_METRICS_AND_THRESHOLDS:
  bear_proximity_alert_m:
    value: 200
    action: <200 m pesistä → P1 hälytys. Meluesteet päälle. Ei ruokajätettä ulkona. Sähköaidan jännite varmistettu â‰¥4 kV.
    source: src:RII1
  moose_collision_risk:
    value: Hirvi tien lähellä pimeällä → ilmoita logistikko-agentille
    source: src:RII2
    action: Hirvi tien lähellä <50 m → ilmoita logistikolle. Huhti-touko (vasominen) ja loka-marras (kiima) = huippuriski.
  wolf_territory_check:
    value: Susi-ilmoitus <5 km säteellä → seuranta-mode
    source: src:RII1
    action: Susi <5 km → seurantataso 2. <2 km → ilmoita core_dispatcherille. <500 m → P1. Susi EU liite IV, tappaminen vain
      poikkeusluvalla.
  hunting_season_dates:
    value: 'Hirvi: 10.10–31.12 (jahtilupa-alue), Karhu: 20.8–31.10 (kiintiö), Jänis: 1.9–28.2'
    source: src:RII3
  game_camera_battery_v:
    value: 6.0
    action: Alle 6V → vaihda akku, ilmoita laitehuoltajalle
    source: src:RII1
  distance_to_building_m:
    value: 50
    source: src:RII1
    action: Petovaroitus + ulkovalot + äänikarkotin.
  object_confidence_pct:
    value: 85
    source: src:RII1
    action: Kirjaa suurriista lokiin, seuraa kameralla.
  garden_dwell_time_s:
    value: 120
    source: src:RII2
    action: Lievä karkote (ultraääni/valo) hirvieläimille.
  human_animal_distance_m:
    value: 100
    source: src:RII1
    action: Hätähälytys + älylukkien lukitus (karhu + ihmisiä ulkona).
  pack_size_bboxes:
    value: 3
    source: src:RII1
    action: Laumahavainto → ilmoitus petoyhdyshenkilölle.
SEASONAL_RULES:
- season: Kevät (huhti-toukokuu)
  rule: Karhujen herääminen + pentuaika. Etäisyyskynnys 50m→100m. Emo + pennut = erittäin vaarallinen.
- season: Syksy (syys-joulukuu)
  rule: Metsästyskausi. 'dog' metsässä ilman ihmistä = viivästä 15 min (metsästyskoira), ellei pihapiiriin.
FAILURE_MODES:
- failure: Dog vs Wolf Confusion
  recovery: 'Tarkista Pihavahdilta: ''person'' < 20m eläimestä → koira, vaimenna petohälytys.'
- failure: IR Reflection Blooming
  recovery: 'Luontokuvaaja: kameraa 5° tai IR-teho -20% hahmon tunnistamiseksi.'
PROCESS_FLOWS:
- flow_id: FLOW_RIIS_01
  trigger: bear_proximity_alert_m ylittää kynnysarvon (200)
  action: <200 m pesistä → P1 hälytys. Meluesteet päälle. Ei ruokajätettä ulkona. Sähköaidan jännite varmistettu â‰¥4 kV.
  output: Tilanneraportti
  source: src:RIIS
- flow_id: FLOW_RIIS_02
  trigger: 'Kausi vaihtuu: Kevät'
  action: '[vko 14-22] Karhut heräävät talviunilta (maalis-huhti), erityisvarovaisuus. Hirvet vasovat touko-kes'
  output: Tarkistuslista
  source: src:RIIS
- flow_id: FLOW_RIIS_03
  trigger: 'Havaittu: Karhu pesien lähellä'
  action: HÄLYTYS P1, meluesteet, varmista ettei ruokajätettä ulkona
  output: Poikkeamaraportti
  source: src:RIIS
- flow_id: FLOW_RIIS_04
  trigger: Säännöllinen heartbeat
  action: 'riistanvartija: rutiiniarviointi'
  output: Status-raportti
  source: src:RIIS
KNOWLEDGE_TABLES:
- local_game_species:
  - species: Karhu (Ursus arctos)
    status: Riistaeläin, kiintiömetsästys
    risk_level: KORKEA pihapiirissä
    source: src:RII3
  - species: Hirvi (Alces alces)
    status: Riistaeläin
    risk_level: KESKITASO (liikenne)
    source: src:RII3
  - species: Valkohäntäpeura (Odocoileus virginianus)
    status: Riistaeläin
    risk_level: MATALA
    source: src:RII3
  - species: Susi (Canis lupus)
    status: Tiukasti suojeltu (luontodirektiivin liite IV)
    risk_level: KORKEA lemmikkieläimille
    source: src:RII1
  - species: Kettu (Vulpes vulpes)
    status: Riistaeläin
    risk_level: MATALA (mehiläispesät)
    source: src:RII3
  - species: Mäyrä (Meles meles)
    status: Riistaeläin
    risk_level: MATALA
    source: src:RII3
- table_id: TBL_ANIMAL_BEHAVIOR
  title: Eläinprofiilit
  rows:
  - animal: Karhu (bear)
    risk: Kriittinen
    deterrent: Voimakas valo + matalataajuinen ääni. Vältä yllättämistä.
  - animal: Hirvi/Peura (deer)
    risk: Matala (kasvivahingot)
    deterrent: Ultraääni, liiketunnistinvalo.
  - animal: Supikoira
    risk: Keskiverto (tautiriski, vieraslaji)
    deterrent: Ilmoitus tuholaisasiantuntijalle.
COMPLIANCE_AND_LEGAL:
