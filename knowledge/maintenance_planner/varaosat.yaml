  - "Varaosien hyllytys: FIFO (First In First Out), vanhimmat edessä — erityisesti kulutustarvikkeet ja kumiosat"
  - "Kriittinen varaosa-analyysi: pitkä toimitusaika (>4 viikkoa) tai valmistajan lopettanut → erityinen buffer-varasto"
  - "OEM vs. geneerinen varaosa: OEM alkuperäinen (kalliimpi, taattu sopivuus), geneerinen halvempi mutta riskit"
