profile: home  # gadget | cottage | home | factory
facts:
  apiary_count: 35
  business_name: JKH Service
  colony_count: 202
  evira: '18533284'
  owner: Jani Korpi
  y_tunnus: 2828492-2
hivemind:
  heartbeat_interval: 30
  idle_research_enabled: true
  max_concurrent_agents: 30
learning:
  auto_evolve: false
  distill_interval_min: 15
  eval_queue_size: 20
  evolve_interval_min: 30
  min_finetune_score: 7.0
  auto_apply_prompt_wins: false
  prompt_apply_min_delta: 0.5
  prompt_apply_min_samples_per_arm: 3
  prompt_live_apply: false
  prompt_rollback_on_regression: true
llm:
  base_url: http://localhost:11434
  model: phi4-mini
  num_gpu: 99
  temperature: 0.4
  timeout: 30
llm_heartbeat:
  base_url: http://localhost:11434
  model: llama3.2:1b
  num_gpu: 99
  temperature: 0.6
  timeout: 15
memory:
  db_path: data/waggle_dance.db
ops_agent:
  auto_model_switch: false
  error_rate_critical: 0.25
  error_rate_warning: 0.1
  gpu_memory_critical: 95
  latency_critical_ms: 30000
  latency_warning_ms: 12000
  monitor_interval: 15
  quality_eval_every: 30
  queue_critical: 4
swarm:
  cooldown_max: 5
  enabled: true
  exploration_rate: 0.2
  load_penalty: 0.15
  low_usage_bonus: 0.15
  min_bids_per_day: 3
  min_tasks_per_day: 2
  newcomer_boost: 0.2
  top_k: 8
token_economy:
  welcome_bonus: 5
yaml_bridge:
  agents_dir: knowledge
agent_levels:
  enabled: true
routing:
  confusion_memory: true
  topic_fingerprints: true
round_table:
  enabled: true
  every_n_heartbeat: 20
  agent_count: 6
  min_agents: 3
  version: 2
night_mode:
  enabled: true
  idle_threshold_min: 15
  max_hours: 8
  interval_s: 10
advanced_learning:
  corrections_enabled: true
  active_learning_enabled: true
  active_learning_min_memory: 100
  embedding_augmentation: true
  multi_hop_enabled: true
  multi_hop_max_hops: 2
  episodic_memory: true
  seasonal_boost: 1.2
  bilingual_index: true
  hot_cache_size: 500
  fi_fast_enabled: true
  enrichment_enabled: true
  enrichment_confidence: 0.80
  web_learning_enabled: true
  web_learning_daily_budget: 50
  distillation_enabled: false
  distillation_api_key: ""
  distillation_model: "claude-haiku-4-5-20251001"
  distillation_weekly_budget_eur: 5.0
  meta_learning_enabled: true
  code_review_enabled: true
  micro_model_enabled: true
  micro_model_v2_enabled: true
  micro_model_v3_enabled: true
  micro_model_v3_path: models/micromodel_v3/lora_adapter
  micro_model_v3_base: HuggingFaceTB/SmolLM2-135M-Instruct
  micro_model_training_interval: 50
  micro_model_min_pairs: 100
  enrichment_temporal_check: true
  failure_twin_enabled: true
  failure_twin_threshold: 0.60
  micro_model_promotion_enabled: true
  micro_model_promotion_min_pairs: 200
  micro_model_promotion_max_error: 0.03
  micro_model_holdout_ratio: 0.2
  micro_model_min_eval_examples: 25
  micro_model_min_accuracy: 0.70
  micro_model_promotion_margin: 0.02
  micro_model_eval_enabled: true
  agent_overlap_detection: true
  night_enricher:
    enabled: true
    chat_history_enabled: false
    rss_feed_enabled: true
    benchmark_count: 2
    rebalance_every: 50
    burst_threshold: 0.80
    burst_max_share: 0.80
    throttle_pass_rate: 0.08
    throttle_window: 30
    throttle_pause_seconds: 300
    gap_high_threshold: 20
    gap_medium_threshold: 50
    gap_normal_threshold: 100
    novelty_score_threshold: 0.80
    dedup_score_threshold: 0.93
    # D1: External source cycle frequencies (0 = disabled)
    ext_web_every_cycles: 10
    ext_distill_every_cycles: 20
    ext_rss_every_cycles: 10
    # D2: Convergence detection
    convergence_novelty_threshold: 0.10
    convergence_patience: 5
    convergence_pause_s: 900
    convergence_window: 20
  memory_limits:
    enabled: true
    max_facts: 200000
    eviction_check_every_n_flushes: 10
    eviction_batch_size: 500
    ttl_rules:
      weather: 1           # hours
      electricity: 1
      electricity_optimization: 6
      camera_event: 168    # 7 days
      audio_event: 168
      home_state: 1
      sensor_reading: 1
      news: 720            # 30 days
      self_enrichment: 2160  # 90 days
      web_learning: 2160
    protected_sources:
      - user_teaching
      - user_correction
      - yaml_scan
      - conversation
      - round_table
      - distillation
feeds:
  enabled: true
  # Weather locations per profile — device fetches weather for where it physically is
  profile_locations:
    gadget: []          # too small for feeds
    cottage:
      - Kouvola
    home:
      - Helsinki
    factory:
      - Helsinki
      - Espoo
  weather:
    enabled: true
    provider: fmi
    # locations resolved from profile_locations + active profile at runtime
    interval_min: 30
  electricity:
    enabled: true
    provider: porssisahko
    interval_min: 15
  rss:
    enabled: true
    interval_min: 120
    feeds:
      - url: "https://www.mehilaishoitajat.fi/feed"
        name: SML
        critical: false
      - url: "https://www.ruokavirasto.fi/rss"
        name: Ruokavirasto
        critical: true
      - url: "https://www.ilmatieteenlaitos.fi/rss/saa"
        name: FMI-saa
        critical: false
      - url: "https://bee-health.extension.org/feed/"
        name: BeeHealth
        critical: false
      - url: "https://www.honeybeeworld.com/feed/"
        name: HoneybeeWorld
        critical: false
      - url: "https://blog.home-assistant.io/atom.xml"
        name: HA-blog
        critical: false
mqtt:
  enabled: false
  host: "192.168.1.100"
  port: 1883
  username: ""
  password: ""
  client_id: "waggledance"
home_assistant:
  enabled: false
  url: "http://homeassistant.local:8123"
  token: ""
  poll_interval_s: 60
  auto_discover: true
frigate:
  enabled: false
  mqtt_topic_prefix: "frigate"
  cameras: []
  min_score: 0.6
  dedup_window_s: 60
  severity_rules:
    critical:
      - bear
      - wolf
    high:
      - person_night
    medium:
      - dog
      - cat
    info:
      - person
      - car
      - bird
alerts:
  enabled: false
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  webhook:
    enabled: false
    url: ""
    headers: {}
  rate_limit:
    max_per_minute: 5
voice:
  enabled: false
  stt:
    model: "small"
    device: "cpu"
    language: "fi"
    wake_word: true
    vad_silence_s: 1.5
  tts:
    voice: "fi_FI-harri-medium"
    data_dir: "data/piper_models"
    speed: 1.0
audio:
  enabled: false
  bee_audio:
    baseline_days: 7
    stress_threshold_hz_shift: 30
    swarming_amplitude_threshold: 0.7
  bird_monitor:
    enabled: false
    model: "BirdNET-Lite"
  mqtt_topics:
    spectrum: "waggledance/audio/+/spectrum"
    event: "waggledance/audio/+/event"
    status: "waggledance/audio/+/status"
elastic_scaling:
  enabled: true
  auto_detect: true
  vram_unload_threshold_pct: 90
  queue_spawn_threshold: 10
runtime:
  primary: waggledance        # "hivemind" during transition, "waggledance" after cutover
  compatibility_mode: false   # true = legacy primary, false = autonomy primary
