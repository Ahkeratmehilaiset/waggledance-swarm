      - "causal chain or root causes identified"
    rollback_possible: true
    max_latency_ms: 300
    trust_baseline: 0.85

  - id: optimize.schedule
    category: OPTIMIZE
    description: "Energy cost minimization and task scheduling"
    preconditions: []
    success_criteria:
      - "optimization solution found"
    rollback_possible: true
    max_latency_ms: 500
    trust_baseline: 0.85

  - id: analyze.routing
    category: DETECT
    description: "Route accuracy tracking and optimization recommendations"
    preconditions: []
