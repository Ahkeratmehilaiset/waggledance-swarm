header:
  agent_id: production_line
  agent_name: Tuotantolinjan monitorointi
  name_fi: 'Tuotantolinjan monitorointi'
  version: 1.0.0
  last_updated: '2026-03-02'
profiles:
  - factory
priority: high
ASSUMPTIONS:
- OEE-seuranta käytössä, MES/ERP-järjestelmä integroituna
- JKH Servicen hunajanlinkauslinja: linko, pumput, suodattimet, purkituslaitteet
- Linkouskausityöntekijät tai aputyövoima — suomen työaikalaki vaikuttaa vuoroihin
- Vuosituotanto ~10 000 kg hunajaa, kapasiteetti noin 1000–2000 kg/päivä linkaushuipuilla
- Tuotantotehokkuuden parantaminen tärkeää kustannusten hallitsemiseksi
DECISION_METRICS_AND_THRESHOLDS:
  oee_target_pct:
    value: 85
    action: "<85% OEE → analysoi kolme tekijää: saatavuus (A), suorituskyky (P),
      laatu (Q). Paranna heikoin ensin."
    source: src:PL1
  cycle_deviation_pct:
    value: 10
    action: ">10% poikkeama syklin tavoiteajasta → selvitä juurisyy (pullonkaula,
      raaka-ainevaje, toimintahäiriö)"
    source: src:PL1
  honey_extraction_kg_hour:
    value: 150
    action: "<150 kg/h linkouksessa → tarkista linkon täyttöaste, kehysten kunto,
      lämpötila (hunaja juoksevampaa >25°C)"
    source: src:PL2
  filling_accuracy_g:
    value: 5
    action: ">±5 g purkituspoikkeama → kalibroi täyttökone, tarkista viskositeetti"
    source: src:PL2
  downtime_min_shift:
    value: 30
    action: ">30 min suunnittelematon seisokki vuorossa → seisokkiraportti, RCA
      viikon sisällä"
    source: src:PL1
  yield_loss_pct:
    value: 3
    action: ">3% hukka (hunaja suodattimissa, putkissa) → puhdistusprotokolla ja
      putkiston tarkistus"
    source: src:PL2
  changeover_time_min:
    value: 45
    action: ">45 min tuotannonvaihtoaika → SMED-analyysi, sisäisten toimintojen
      ulkoistaminen"
    source: src:PL1
SEASONAL_RULES:
- season: Kevät
  action: "Linkauskauden valmistelu: huolto, kalibroinnit, tarvikkeet (suodatinkangas,
    purkit, kannet). Tuotantosuunnitelma satoennusteen perusteella. Henkilöstön
    perehdytys kausiapulaisille ennen kauden alkua."
  source: src:PL2
- season: Kesä
  action: "Huipputuotantoaika. Linkouspäivien optimointi: hunajakennot kypsiksi
    ennen linkoa (kosteus alle 18%). Linjaa ei saa seisottaa turhan pitkään — käyttämätön
    hunaja kristalloituu putkistoon. Ylityöt mahdollisia — TTurvL huomioitava."
  source: src:PL2
- season: Syksy
  action: "Viimeinen linkouskierros ennakoitava huolellisesti. Linjan pesuprotokolla
    kauden lopussa (steriloitu vesi + elintarvikepesuaine). Varastoon jäävä hunaja
    dokumentoitava eräkohtaisesti. Laitteiden talvisäilytys puhdistettuna."
  source: src:PL2
- season: Talvi
  action: "Talvikunnossapito ja laiteinvestointien suunnittelu. OEE-analyysi edelliseltä
    kaudelta — oppimispisteet seuraavaan. Mahdollisten uusien laitteiden hankintapäätökset
    (linko, purkitusautomaatti). Henkilöstösuunnitelma seuraavalle kaudelle."
  source: src:PL1
FAILURE_MODES:
- mode: Linkon tasapainovikaantuminen kesken linkauksen
  detection: "Linko tärisee epätavallisesti, turvalukko laukeaa, pyörimisnopeus
    ei stabiloidu"
  action: "Pysäytä linko välittömästi. Avaa ja tarkista kehysten asettelu —
    epätasainen jako aiheuttaa tärinän. Tasapainota kehykset ennen uudelleenkäynnistystä.
    Dokumentoi tapahtuma."
  source: src:PL2
- mode: Tuotantolinjan pullonkaula (suodatin tukkeutunut)
  detection: "Hunajan virtausnopeus laskee, paine-ero suodattimen yli kasvaa,
    pumppu ylikuormittuu"
  action: "Vaihda suodatinkangas. Jos paine-ero yli 0,5 bar — tuotanto pysäytetään
    suodattimen vaihtoa varten. Pidä vähintään 2 varaoitta aina."
  source: src:PL2
- mode: Purkituskoneen täyttöpään tukkeutuminen
  detection: "Täyttöpaino vaihtelee yli ±10 g, täyttöpää valuttaa tai ei aukeile
    normaalisti"
  action: "Pysäytä linja. Pura täyttöpää ja puhdista kuumalla vedellä. Tarkista
    O-renkaat. Käynnistä testierällä ennen tuotantoa."
  source: src:PL2
PROCESS_FLOWS:
  linkauskauden_sykli:
    steps:
    - 'Touko: laitteiston huolto, kalibroinnit, tarvikkeet'
    - 'Kesäkuu: ensimmäinen linkaus (kevätmesi, rypsi)'
    - 'Heinä: päälinkoukset, ylityöt tarvittaessa'
    - 'Elo: viimeiset linkoukset, linja-analyysi'
    - 'Syys: linjapuhdistus, laitteiden varastointi'
    - 'Loka-marras: OEE-raportti, kehitysehdotukset'
    - 'Joulu-helmi: investointisuunnittelu, henkilöstösuunnitelma'
    - 'Maalis: seuraavan kauden ennakkovalmistelu'
COMPLIANCE_AND_LEGAL:
  tyoaika: "Työaikalaki 872/2019: säännöllinen työaika max 8h/pv, 40h/vko.
    Ylityö max 138h/4kk-jakso tai 250h/vuosi [src:PL3]"
  elintarviketurvallisuus: "Elintarvikelaki 297/2021: hunaja on elintarvike,
    omavalvontasuunnitelma pakollinen. Eräkohtainen jäljitettävyys vaadittava [src:PL2]"
  paineastiasaadokset: "Tukes: painelaitteet (linko, paine-säiliöt) vaativat
    tarkastuksen jos yli 0,5 bar. Linko = ei painelaite, mutta turvallisuus huomioitava [src:PL1]"
UNCERTAINTY_NOTES:
- "OEE 85% on World Class -taso teollisuudessa; hunajankäsittelyssä sesonkiluonne
  vaikeuttaa vertailua."
- "Hunajan viskositeetti vaihtelee merkittävästi kukkalajin ja lämpötilan mukaan —
  prosessointiolosuhteet sovitettava."
