  No code logic changes. No schema changes. No new dependencies. No
  changes to constitution.yaml or any foundational anchor. Cell topology
  remains 8 cells; subdivision logic remains advisory-only and
  shadow-first. The flip is executed in an isolated worktree
  (/c/python/project2-flip) on branch phase9/post-campaign-atomic-flip,
  which goes through a normal PR review before merging to main.

  PHASE 8.5 STATUS

  Phase 8.5 producer subsystems (vector-chaos, curiosity-organ,
