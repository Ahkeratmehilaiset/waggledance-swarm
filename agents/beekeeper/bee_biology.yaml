# Apis mellifera — Perustietokanta (Suomi)
# Operatiivinen hakuteos ammattilaisille
# Lähteet: Ruokavirasto, Luke, EFSA, SML, Seeley, Winston, Somerville

anatomia:
  silmat:
    kokonaismaara: 5
    verkkosilmat: 2
    pistesilmat_ocellit: 3
    ommatidit:
      tyolainen: "4000-5000"
      kuningatar: "3000-4000"
      kuhnuri: "7000-8000+"
    ocellit_tehtava: "Mittaavat valon intensiteettiä ja polarisaatiota. Ohjaavat vuorokausirytmiä ja suunnistusta."
    nakoalue_nm: "300 (UV) – 650 (keltainen/oranssi)"
    punainen: "Ei näe punaista, näkee UV-valon (mesiviitat)"
    valkyntatajuus_hz: 300
    ihmisen_valkynta_hz: 50
  hajuaisti:
    hajureseptorigeenejä: 170
    vertailu: "Ihmisellä ~400, koiralla ~800+. Mehiläinen erottaa satoja yhdisteitä hiukkastasolla."
  siivet:
    maara: 4
    etusiivet: 2
    takasiivet: 2
    hamuli_koukut: "16-23 mikroskooppista koukkua takasiivessä"
    lentolihakset: "Epäsuorat (pitkittäis- ja pystylihakset keskiruumiissa). Eivät kiinnity siipiin."

fysiologia:
  verenkierto:
    tyyppi: "Avoin verenkiertojärjestelmä"
    sydän: "Pitkä putkimainen selkäputki (dorsal vessel)"
    kammiot: 5
    syke_lepo: 60
    syke_lento: "250-300+"
  hengitys:
    spiraakkelit: "10 paria (2 keskiruumiissa, 8 takaruumiissa)"
    keuhkot: false
    mekanismi: "Happi trakeaalijärjestelmään ja ilmapusseihin suoraan kudoksille. Takaruumiin pumppaus."
  termoregulaatio:
    yksilo: "Vaihtolämpöinen"
    yhdyskunta: "Tasalämpöinen superorganismi"
    lammontuotto: "Lentolihakset irrotetaan siivistä, värisytys (shivering thermogenesis), > 40°C"
    jaahdytys: "Vesi levitetään kennoihin, haihdutetaan siipiä leyhyttelemällä (evaporatiivinen)"

kehitys_vrk:
  kuningatar: {muna: 3, toukka: 5.5, kotelo: 7.5, yhteensa: 16}
  tyolainen: {muna: 3, toukka: 6, kotelo: 12, yhteensa: 21}
  kuhnuri: {muna: 3, toukka: 6.5, kotelo: 14.5, yhteensa: 24}

kesa_vs_talvimehilainen:
  kesamehilainen:
    elinika: "4-6 viikkoa"
    kuolinsyy: "Lentolihasten ja siipien loppuunkuluminen (proteiinivaje)"
  talvimehilainen_diutinus:
    kuoriutuminen: "Elo-syyskuu"
    elinika: "6-8 kuukautta"
    fysiologia: "Syö massiivisesti siitepölyä, kasvattaa rasvakudoksen, varastoi vitellogeniinia"
    huom: "Ei kasvata sikiöitä syksyllä = säästää elinvoiman kevääseen"

talvehtiminen:
  talvipallo:
    muodostumislampo_c: "10-14 (ulkolämpötila laskiessa)"
    ydinlampo_sikioton_c: 20
    ydinlampo_sikiointi_c: 34.5
    ulkokuori_minimi_c: 8
    koomaraja: "Ulkokuori < 8°C"
  ravintokulutus:
    keskitalvi_kg_kk: 1
    kevat_sikiointi_kg_kk: "3-5"
    kokonaistalvikulutus_suomi_kg: "15-20"
  kuolleisuus:
    normaali_talvitappio_pct: "10-15"
    suurimmat_syyt: ["Varroan aiheuttamat virukset (syksyllä)", "Nälkä (keväällä)"]

hierarkia:
  kuningatar:
    feromoni: "QMP (Queen Mandibular Pheromone)"
    vaikutukset:
      - "Estää työläisten munasarjojen kehittymisen"
      - "Estää uusien emokennojen rakentamisen (parveilueste)"
      - "Houkuttelee kuhnureita parittelulennolla"
      - "Pitää yhdyskunnan koossa (sosiaalinen liima)"
  tyolaiset_ikapolyetismi:
    pv_1_3: "Kennonpuhdistaja (ylläpitää hygieniaa)"
    pv_4_12: "Hoitajamehiläinen (ruokahaararauhaset; toukkien ruokinta emomaidolla ja siitepölyllä)"
    pv_13_18: "Rakentaja (vaharauhaset; kennoja, siitepölyn pakkaus, meden vastaanotto)"
    pv_19_21: "Vartijamehiläinen (lentoaukko, hälytysferomoni)"
    pv_22_plus: "Kenttämehiläinen (mesi, siitepöly, vesi, propolis)"
  kuhnurit:
    synty: "Hedelmöittymättömistä munista (haploidi)"
    tehtava: "Paritella vieraiden kuningattarien kanssa DCA:lla"
    kuhnurisota: "Elo-syyskuu: työläiset lopettavat ruokkimisen, repivät/kantavat ulos"
  parveilu:
    tiedustelijat: "Scouts etsivät pesäkoloja"
    keikutustanssi: "Waggle dance kertoo sijainnin ja laadun"
    paatoksenteko: "Quorum sensing: tarpeeksi moni tanssii saman kohteen puolesta → parvi siirtyy"

taudit_suomi:
  AFB:
    nimi: "Amerikkalainen toukkamätä"
    aiheuttaja: "Paenibacillus larvae"
    kohde: "Toukka peitetyssä kennossa"
    oireet: ["Kansi tummuu, kuopalle, reikiintyy", "Ruskea liimamainen massa", "Mätä haju"]
    diagnostiikka: "Ropy test: tikulla vetäessä massa venyy rihmaksi"
    lakivelvoite: "Valvottava eläintauti. Ilmoitus kunnaneläinlääkärille. Poltto. Kaluston desinfiointi."
  EFB:
    nimi: "Eurooppalainen toukkamätä"
    aiheuttaja: "Melissococcus plutonius"
    kohde: "Toukka avoimessa kennossa"
    oireet: ["Toukka kiertyy luonnottomasti", "Kellertävä, sulaa pohjalle", "Hapan haju"]
    erot_AFB: "Ennen peittämistä, ei venyvää massaa. Hoito: emonvaihto + puhdas kalusto."
    lakivelvoite: "Ilmoitettava ja kartoitettava"
  varroa:
    nimi: "Varroa destructor"
    status: "Suurin yksittäinen uhka Suomen mehiläistaloudelle"
    elinkierto: "Naaras menee kennoon ennen peittämistä (suosii kuhnurikennoja). Imee rasvakudosta. Lisääntyy suljetussa kennossa."
    kriittinen_raja: "> 3% elokuussa → välitön kemiallinen torjunta"
    diagnostiikka: ["Pohjapahvin seuranta", "Tomusokeritesti / Alkoholipesu (~300 mehiläistä)"]
    torjunta:
      mekaaninen: "Kuhnurihaudonnan leikkaus alkukesästä"
      kemiallinen: ["Oksaalihappo (loka-marraskuu, sikiöttömään aikaan)", "Muurahaishappo (loppukesä)", "Tymolivalmisteet"]
  nosema:
    apis: "Kevätripulointi (ruskeat tahrat pesän etuseinässä)"
    ceranae: "Salakavala oireeton nääntyminen. Yhdyskunta kutistuu."
  virukset:
    DWV: "Deformed Wing Virus: Töpösiipisyys. Merkki pitkälle edenneestä varroasta."
    CBPV: "Chronic Bee Paralysis Virus: Tärinä, karvattomuus, lentokyvyttömyys."

rodut:
  italMeh:
    nimi: "Italialainen (Apis mellifera ligustica)"
    vari: "Keltainen"
    ominaisuudet: "Isot pesät, hyvä sadonkerääjä"
    talvenkestävyys: "Kuluttaa paljon talviruokaa"
    aggressiivisuus: "Lauhkea"
    parveiluvietti: "Matala"
  grnMeh:
    nimi: "Krainilainen (Apis mellifera carnica)"
    vari: "Tumma/harmaa"
    ominaisuudet: "Nopea kevätkehitys. Talvehtii pienellä ruualla."
    talvenkestävyys: "Erinomainen"
    aggressiivisuus: "Lauhkea"
    parveiluvietti: "Korkea"
  buckfast:
    nimi: "Buckfast (Hybridi)"
    ominaisuudet: "Brother Adamin jalostama risteytys"
    talvenkestävyys: "Hyvä, linjakohtainen"
    aggressiivisuus: "Erittäin lauhkea"
    parveiluvietti: "Matala"
  mellifera:
    nimi: "Pohjolan mehiläinen (Apis mellifera mellifera)"
    vari: "Musta"
    ominaisuudet: "Alkuperäinen. Pienet yhdyskunnat, säästeliäs."
    talvenkestävyys: "Täydellinen"
    aggressiivisuus: "Herkempi puolustamaan"
    huom: "Suojeltu kanta Suomessa"

ekologia:
  lentosade:
    optimaalinen_km: "1-3"
    maksimi_km: "5-10+"
    pinta_ala_3km_ha: 2800
  energiankulutus:
    hunajaa_per_km_mg: 0.5
    mesilasti_mg: 40
  paasadon_lahteet_suomi: ["Vadelma", "Maitohorsma", "Valkoapila", "Rypsi/Rapsi", "Kanerva"]
  meden_eritys:
    yolampo_min_c: 10
    paivalampo_min_c: 15
    maapera: "Riittävän kostea"

kriittiset_kynnysarvot:
  lentolampo_c: {alaraja: "10-12", optimi: "15-25", ylaraja: "35-38"}
  sikioalan_lampo_c: {alaraja: 34.0, optimi: "34.5-35.5", ylaraja: 36.0}
  talvipallon_ydin_c: {alaraja: 14, optimi: 20, ylaraja: 35}
  kosteus_talvi_pct: {optimi: "40-60", ylaraja: "80 (kondensoituminen)"}
  talviruoka_kg: {alaraja: "15 (kuolemanvaara)", optimi: "20-25", ylaraja: "25+"}
  varroa_elokuu_pct: {optimi: 0, ylaraja: "3 (välitön torjunta)"}

lahteet:
  viranomaiset: ["Ruokavirasto", "Luke", "EFSA"]
  ammattijarjestot: ["SML (Suomen Mehiläishoitajain Liitto)"]
  kirjallisuus: ["Mehiläishoitoa käytännössä (SML)", "Honey Bee Democracy (Seeley)", "The Biology of the Honey Bee (Winston)", "Fat Bees - Skinny Bees (Somerville)"]
