      - "Tarkista pesien tuentarakenteet ja talvisuojat myrskyn jälkeen"
      - "Aloita kevätkauden valmistelu: hanki uusia kehikoita ja kennoaihioita"
    tasks_en:
      - "Bees forming winter cluster — no inspections"
      - "Check hive stands and winter covers after storms"
      - "Start spring preparation: order new frames and foundation"
