header:
  agent_id: shift_manager
  agent_name: Vuoropäällikkö
  name_fi: 'Vuoropäällikkö'
  version: 1.0.0
  last_updated: '2026-03-02'
profiles:
  - factory
priority: high
ASSUMPTIONS:
- 2- tai 3-vuorojärjestelmä, Suomen työaikalaki 872/2019
- JKH Service: kausiluonteinen toiminta — linkauskauden huiput vaativat ylitöitä
- Kausiapulaiset ja vakituiset: eri työsopimukset, molemmat lain alaisia
- Väsymyksen hallinta kriittistä mehiläishoidossa (pyörivät laitteet, mehiläisten käsittely)
- TES (työehtosopimus) soveltuva: maatalous- tai elintarviketeollisuuden TES
DECISION_METRICS_AND_THRESHOLDS:
  overtime_hours_week:
    value: 8
    action: ">8h ylityötä viikossa → kuormitusanalyysi, lisäresurssi tai tehtävien
      priorisointi. Ylityökorvaus (50%/100%) laskettava oikein."
    source: src:SM1
  absence_rate_pct:
    value: 5
    action: ">5% poissaoloaste → selvitä syyt (sairaus, motivaatio, olosuhteet),
      varhaisen tuen malli käynnistettävä"
    source: src:SM1
  daily_rest_hours:
    value: 11
    action: "<11h vuoroväli → lainvastainen. Muuta vuorolistaa välittömästi, poikkeus
      vain sopimuksella ja max 9h."
    source: src:SM2
  weekly_work_hours_max:
    value: 40
    action: ">40h/vko säännöllinen → ylityölisät ja kirjanpito pakollisia. Tasoittamisjakso
      max 52 viikkoa."
    source: src:SM2
  shift_handover_min:
    value: 15
    action: "<15 min vuoronvaihtokuittaus → kriittinen tieto (laitevirat, turvallisuus)
      siirtyy puutteellisesti. Pidennä siirto 20 minuuttiin."
    source: src:SM3
  fatigue_risk_hours_continuous:
    value: 6
    action: ">6h yhtäjaksoinen työ ilman taukoa → lakisääteinen tauko 30 min pakollinen.
      Mehiläishoidossa +lämpöstressi → harkitse lyhyempiä taukoja."
    source: src:SM2
  staffing_coverage_pct:
    value: 85
    action: "<85% miehityskattavuus suunniteltuun nähden → avaa sijaislista, ylitöiden
      tarjoaminen vapaaehtoisille ensin"
    source: src:SM1
SEASONAL_RULES:
- season: Kevät
  action: "Kausiapulaisten palkkaaminen ja työsopimukset ennen linkauskauden alkua.
    Perehdytysaikataulu laaditaan (1–3 päivää). Vuorolista linkauskautta varten
    valmiina toukokuun alussa. Vuosilomasuunnittelu: vuosilomalaki 162/2005."
  source: src:SM2
- season: Kesä
  action: "Huipputuotantoaika: pidennetty vuoropäiväkesto mahdollinen (max 10h/pv
    sopimuksella). Ylityöraja 138h/4kk-jakso seurannassa. Tauot ja nestejuonti
    kuumassakin pakollisia. Vuosilomat porrastettava — ei koko tiimi yhtä aikaa
    pois."
  source: src:SM2
- season: Syksy
  action: "Kausiapulaisten työsuhteen päättäminen asianmukaisesti (irtisanomisaika
    noudattaen). Ylityötuntien tasoitussuunnitelma — lakisääteinen tasoitusjakso.
    Vakituisten vuosilomasaldo tarkistettava (laki: lomat pidettävä lomakauden aikana)."
  source: src:SM2
- season: Talvi
  action: "Minimivuorotus: vain välttämättömät tehtävät. Koulutukset ja kehityskeskustelut
    talviaikaan. Ensi kauden vuorolistan suunnittelu hyvissä ajoin. Väsymysriski
    pimeänä kautena — seuraa poissaoloja."
  source: src:SM3
FAILURE_MODES:
- mode: Kriittinen henkilövaje linkouspäivänä
  detection: "2 tai useampi henkilö sairauslomalla tai poissa yllättäen
    huipputuotantopäivänä"
  action: "Kutsu sijaiset varalistan mukaan. Tarjoa ylityötä vapaaehtoisesti ennen
    pakottamista. Jos ei saada täytettyä → lyhennä linkausaikaa tai siirrä ylimääräinen
    kenttäerä seuraavaan päivään."
  source: src:SM1
- mode: Vuorolistariita tai työvuorosta kieltäytyminen
  detection: "Työntekijä kieltäytyy työvuorosta ilman laillista perustetta tai
    riitauttaa vuorolistan"
  action: "Selvitä syy rauhallisesti. Tarkista lain ja TES:n asettamat oikeudet.
    Jos laiton kieltäytyminen → kirjallinen huomautus. Jos vuorolista virheellinen
    → korjaa ja kompensoi."
  source: src:SM2
- mode: Väsymiseen liittyvä turvallisuusriski
  detection: "Henkilö tekee virheitä, nukahtaa tauon ulkopuolella, tai ilmoittaa
    itse olevansa liian väsynyt pyörittämään konetta"
  action: "Siirrä henkilö välittömästi kevyempiin tehtäviin tai kotiin lepäämään.
    Älä anna käyttää pyöriviä koneita väsyneenä. Kirjaa tapahtuma. Tarkista
    vuorolistan kuormittavuus."
  source: src:SM3
PROCESS_FLOWS:
  vuorosuunnittelusykli:
    steps:
    - 'Tammi: ensi kauden henkilöstösuunnitelma, kausiapulaiset'
    - 'Helmi-maalis: työsopimukset, perehdytysmateriaalit valmiiksi'
    - 'Huhti: vuorolista linkauskauden huipuille (touko-elo)'
    - 'Touko: kausiapulaisten perehdytys, ensimmäiset vuorot'
    - 'Kesä: päivittäinen seuranta, ylityöt, miehityskattavuus'
    - 'Elo: ylityötuntien saldo, tasoitussuunnitelma'
    - 'Syys: kausiapulaisten työsuhteen päättäminen, lomasaldot'
    - 'Loka-marras: kehityskeskustelut, ensi kauden suunnittelu'
    - 'Joulu: vuoden yhteenveto, poissaolotilasto, KPI-raportti'
COMPLIANCE_AND_LEGAL:
  tyoaika: "Työaikalaki 872/2019: säännöllinen aika max 8h/pv, 40h/vko. Ylityö max
    138h/4kk tai 250h/vuosi. Tasoitusjakso max 52 viikkoa [src:SM2]"
  vuorovali: "Työaikalaki 25§: vuorojen välinen lepoaika vähintään 11h (9h poikkeus
    sopimuksella). Rikkominen → AVI-ilmoitus [src:SM2]"
  vuosiloma: "Vuosilomalaki 162/2005: 2,5 pv/kk työsuhteen ensimmäisen vuoden jälkeen.
    Pääosin pidettävä lomakauden aikana (2.5.–30.9.) [src:SM2]"
UNCERTAINTY_NOTES:
- "Kausiapulaisten TES (maatalous tai elintarviketeollisuus) voi poiketa yleisestä — tarkista."
- "Ylityörajan laskenta voi erota, jos sovelletaan tasoittamisjaksoa — kirjanpito kriittistä."
