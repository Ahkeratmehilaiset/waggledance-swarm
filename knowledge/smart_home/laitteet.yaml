# Kodin automaatio ja IoT — Laitteet
# WaggleDance Swarm AI
title: "Älykotilaitteet"
agent: "Kodin automaatio ja IoT"
facts:
  - "Shelly Plus 1PM: WiFi-rele + tehomittaus (1-channel), REST-API ja MQTT, ei hub-tarvetta, max 16A"
  - "Shelly Dimmer 2: LED-himmennin, 230V, max 200W LED, ohjaus puhelimella tai kytkimellä"
  - "Aqara Zigbee-sensoriperhe: lämpötila/kosteus-sensori H1, liiketunnistin P1, ovitunnistin D1 — edullisia 15–25 €/kpl"
  - "Zigbee vs. Z-Wave vs. WiFi: Zigbee mesh-verkko ≤10 m hyppyväli, Z-Wave parempi kantama, WiFi eniten kaistaa"
  - "Home Assistant (HA): avoimen lähdekoodin kotiautomaatioalusta, tukee 3000+ integraatiota, asennus Raspberry Pi:lle tai Yellow-laitteeseen"
  - "Home Assistant Yellow: omistettu HA-laitteisto, Zigbee+Thread integroitu, hinta ~150 €, ei erillisiä hub-laitteita"
  - "Matter-standardi: yhteinen IoT-standardi (Apple, Google, Amazon, TP-Link), laitteet toimivat keskenään 2024→"
  - "Thread-verkko: IP-pohjainen mesh, Matter-laitteet hyödyntävät, parempi kuin Zigbee tietoturvan kannalta"
  - "Älythermostaatti (Tado, Netatmo, HA-yhteensopiva): huonekohtainen ohjaus, geofencing, säätöennuste → 15–30% säästö"
  - "Älypistoke (Shelly Plug S): tehomittaus, ajastus, 2500W max, WiFi, integroituu HA:han — tunnista standby-kulutus"
  - "Ovi- ja ikkuna-anturit: Aqara D1 tai IKEA Parasoll, ilmoitus auki/kiinni HA-automaatioihin"
  - "Liiketunnistimet: Aqara P1 tai IKEA Vallhorn — valaistuksen automaatio, turvallisuushälytykset"
  - "IP-kamera: Reolink, Amcrest tai Frigate NVR+kamera — paikallinen tallennus, ei pilveä, RTSP-stream HA:han"
  - "Palovaroitin älykkääksi: Nest Protect tai linkitä perinteinen varoitin HA:han Shelly-relein kautta"
  - "Sähkömittari pulse-liittymällä: Shelly EM tai P1 Reader — reaaliaikainen kulutusseuranta, tuotantoseuranta aurinkoenergiassa"
  - "MQTT-protokolla: kevyt pub/sub-viestintä IoT-laitteille, Mosquitto-brokeri paikallisesti, tietoturvallisin vaihtoehto"
  - "Node-RED: visuaalinen automaatiotyökalu, toimii HA:n rinnalla, sopii monimutkaisiin logiikkoihin"
  - "Tietoturva: vaihda oletussalasanat, erillinen IoT-VLAN, päivitykset automaattisiksi, älä avaa portit internettiin"
  - "Varmuuskopio: HA automaattivarmuuskopio viikottain Google Drive tai Nabu Casa -pilveen, palauttaminen <5 min"
