header:
  agent_id: forester
  agent_name: Metsänhoitaja
  version: 1.0.0
  last_updated: '2026-02-21'
ASSUMPTIONS:
- Tontilla yli 15m puita jotka yltävät kaatuessaan rakennukseen tai sähkölinjaan.
- Sääagentti toimittaa reaaliaikaisen tuulennopeuden puuskissa (m/s).
DECISION_METRICS_AND_THRESHOLDS:
  harvesting_volume_m3_ha:
    value: 50-80 (harvennushakkuu), 150-250 (päätehakkuu)
    source: src:MET1
    action: Harvennushakkuu 50-80 m³/ha → korjuu. Päätehakkuu >150 m³/ha. Metsänkäyttöilmoitus â‰¥10 pv ennen hakkuuta.
  regeneration_deadline_years:
    value: 3
    action: Uudistaminen aloitettava 3 vuoden sisällä päätehakkuusta
    source: src:MET2
  seedling_density_per_ha:
    value: 1800-2000 (kuusi), 2000-2500 (mänty)
    source: src:MET1
    action: Kuusi 1800-2000/ha, mänty 2000-2500/ha. <1500 → täydennysistutus. Tarkistus 3v päästä.
  thinning_trigger_basal_area_m2:
    value: 22-26 (mänty), 24-28 (kuusi) m²/ha → harvennustarve
    source: src:MET1
    action: 'Mänty: harvennusraja 22-26 m²/ha (Etelä-Suomi). Kuusi: 24-28 m²/ha. Ylitys → harvennus.'
  windthrow_risk_after_harvest:
    value: KORKEA ensimmäiset 5 vuotta reunametsässä
    action: Jätä suojavyöhyke 10-20m
    source: src:MET1
  wind_gust_ms:
    value: 21
    source: src:MET1
    action: Tuulituhoriski-hälytys. PTZ skannaamaan latvuksia.
  tree_sway_angle_deg:
    value: 15
    source: src:MET1
    action: Varoita timpuria osumasta. Estä pihalla liikkuminen.
  permanent_lean_deg:
    value: 5
    source: src:MET2
    action: Merkitse vaaralliseksi. Arboristin kaato.
  snow_load_branch_angle_deg:
    value: 30
    source: src:MET1
    action: Varoita latvuskatkoksista. Hälytys tielle pudonneista oksista.
  deadwood_detected:
    value: true
    source: src:MET2
    action: Huoltokutsu oksan poistamiseksi.
SEASONAL_RULES:
- season: Syksy (loka-marraskuu)
  rule: Syysmyrskyt. Märkä maa → juuret antavat periksi. Lean Angle raja 5°→3°.
- season: Talvi (joulu-helmikuu)
  rule: Tykkylumikausi. Oksien taipumisen seuranta. Lämpö nollan molemmin puolin = pahin (jäätyvä tykky).
FAILURE_MODES:
- failure: PTZ-referenssipiste siirtyy (tuuli)
  recovery: Keskeytä Sway Angle. Luota sääagentin tuulidataan. Visuaalinen arvio myrskyn jälkeen.
- failure: Rankkasade estää tunnistuksen
  recovery: 'Akustinen seuranta (Ornitologin mikrofoni): kuuntele natinaa ja paukahduksia.'
PROCESS_FLOWS:
- flow_id: FLOW_METS_01
  trigger: harvesting_volume_m3_ha ylittää kynnysarvon (50-80 (harvennushakkuu), 150-250 (päätehakkuu))
  action: Harvennushakkuu 50-80 m³/ha → korjuu. Päätehakkuu >150 m³/ha. Metsänkäyttöilmoitus â‰¥10 pv ennen hakkuuta.
  output: Tilanneraportti
  source: src:METS
- flow_id: FLOW_METS_02
  trigger: 'Kausi vaihtuu: Kevät (huhti-touko)'
  action: '[vko 14-22] EI hakkuita lintujen pesimäaikana (touko-heinä suositus). Taimien istutus touko-kesäkuu.'
  output: Tarkistuslista
  source: src:METS
- flow_id: FLOW_METS_03
  trigger: 'Havaittu: Kirjanpainajahyönteiset kuusikossa'
  action: Poista saastuneet rungot HETI (ennen aikuisten kuoriutumista), ilmoita entomologille
  output: Poikkeamaraportti
  source: src:METS
- flow_id: FLOW_METS_04
  trigger: Säännöllinen heartbeat
  action: 'metsanhoitaja: rutiiniarviointi'
  output: Status-raportti
  source: src:METS
KNOWLEDGE_TABLES:
- tree_species:
  - species: Kuusi (Picea abies)
    rotation_years: 60-80
    growth_m3_per_ha_yr: 6-10
    source: src:MET1
  - species: Mänty (Pinus sylvestris)
    rotation_years: 70-100
    growth_m3_per_ha_yr: 4-7
    source: src:MET1
  - species: Rauduskoivu (Betula pendula)
    rotation_years: 50-70
    growth_m3_per_ha_yr: 5-8
    source: src:MET1
- table_id: TBL_TREE_RISK
  title: Puiden riskivyöhykkeet
  rows:
  - distance: < 15m rakennuksesta
    risk: Korkea (osumariski)
    action: Kuntoarviointi. Kallistuma → välitön poisto.
  - distance: < 5m sähkölinjasta
    risk: Kriittinen (palovaara + sähkökatko)
    action: Ilmoita sähköyhtiölle.
COMPLIANCE_AND_LEGAL:
- 'Pelastuslaki 379/2011 Â§ 9: kiinteistön omistaja velvollinen huolehtimaan ettei puu tai rakennelma aiheuta vaaraa [src:MET2].'
UNCERTAINTY_NOTES:
- 'PTZ-kameran huojuntakulma (Sway Angle) vääristyy perspektiivistä. VALUE: UNKNOWN. TO_VERIFY: LiDAR tai stereonäkö.'
