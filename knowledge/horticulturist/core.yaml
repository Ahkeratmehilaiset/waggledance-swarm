header:
  agent_id: horticulturist
  agent_name: Horticulturist
  version: 1.0.0
  last_updated: '2026-02-21'
ASSUMPTIONS:
- Älykkäät kosteusanturit (VWC) 15 cm syvyydessä.
- Kastelujärjestelmä kytketty sähkömekaanisiin venttiileihin (Sähköasentajan ohjattavissa).
DECISION_METRICS_AND_THRESHOLDS:
  soil_ph_target:
    value: 6.0-6.5 (puutarha), 4.5-5.5 (mustikka/puolukka)
    source: src:HOR1
    action: pH<4.5 → kalkitus (dolomiittikalkki 200-400 g/m²). pH>7.5 → happamoitus (turvemulta). Mittaa 3v välein.
  frost_free_period_days:
    value: 130-150 (vyöhyke II-III)
    source: src:HOR2
    action: <130 pv hallaton kausi → valitse aikaiset lajikkeet. Hallaöinä (T<0°C touko-syys) → harsokangas 17 g/m².
  watering_trigger_mm:
    value: Alle 5 mm viikossa kesällä → kastelu
    source: src:HOR1
  nitrogen_fertilizer_kg_per_100m2:
    value: 7-10 (nurmikko), 3-5 (marjapensaat)
    source: src:HOR1
    action: Nurmikko 7-10 kg/100m²/v, hedelmäpuut 3-5 kg. Ylitys → huuhtoutumisriski vesistöön.
  mulching_depth_cm:
    value: 5-8
    action: Kattaminen estää rikkakasveja ja säilyttää kosteutta
    source: src:HOR1
  soil_moisture_vwc_pct:
    value: 25
    source: src:HOR1
    action: Kastelu, jos sääagentti ei ennusta sadetta 12h.
  frost_risk_h:
    value: 2
    source: src:HOR1
    action: 'Hälytys: peitä istutukset hallaharsolla. Lämmityskaapelit.'
  invasive_species_area_m2:
    value: 0.5
    source: src:HOR2
    action: Merkitse karttaan, hälytä kitkemisestä ennen kukinnan päättymistä.
  grass_height_cm:
    value: 10
    source: src:HOR1
    action: Robottileikkuri ajastukseen tai muistutus.
  leaf_yellowing_pct:
    value: 30
    source: src:HOR1
    action: Ravinteen puutos tai ylikastelu. Pysäytä automaattikastelu.
SEASONAL_RULES:
- season: Kevät (toukokuu)
  rule: Hallavaara. Mikroklimastollinen seuranta. +2°C ja tyyntä = hallavaroitus.
- season: Syksy (syys-lokakuu)
  rule: Sadonkorjuu. Lopeta kastelu juuresten ja omenapuiden osalta (mätänemisriski).
FAILURE_MODES:
- failure: Kosteusanturi 0% (kaapeli poikki)
  recovery: 'Virtual Sensor: käytä sääagentin sademääriä. Älä kastele sokeasti.'
- failure: Kasteluventtiili jumiutuu auki
  recovery: VWC > 60% → Sähköasentaja katkaisee pumpun pääkytkimestä.
PROCESS_FLOWS:
- flow_id: FLOW_HORT_01
  trigger: soil_ph_target ylittää kynnysarvon (6.0-6.5 (puutarha), 4.5-5.5 (mustikka/puolukka))
  action: pH<4.5 → kalkitus (dolomiittikalkki 200-400 g/m²). pH>7.5 → happamoitus (turvemulta). Mittaa 3v välein.
  output: Tilanneraportti
  source: src:HORT
- flow_id: FLOW_HORT_02
  trigger: 'Kausi vaihtuu: Kevät (huhti-touko)'
  action: 'Maanäyte 3v välein, kalkitus pH<5.5, istutukset hallavaaran jälkeen (vyöhyke II: ~15.5.)'
  output: Tarkistuslista
  source: src:HORT
- flow_id: FLOW_HORT_03
  trigger: 'Havaittu: Hallaturma'
  action: Peitä taimet harsokankaalla, siirrä ruukut sisään, ilmoita lentosää-agentille
  output: Poikkeamaraportti
  source: src:HORT
- flow_id: FLOW_HORT_04
  trigger: Säännöllinen heartbeat
  action: 'hortonomi: rutiiniarviointi'
  output: Status-raportti
  source: src:HORT
KNOWLEDGE_TABLES:
- bee_friendly_plants:
  - plant: Maitohorsma
    bloom: vko 27-33
    nectar_score: 3
    source: src:HOR3
  - plant: Valkoapila
    bloom: vko 24-32
    nectar_score: 2
    source: src:HOR3
  - plant: Kurjenmiekka
    bloom: vko 24-27
    nectar_score: 2
    source: src:HOR3
  - plant: Pajut (Salix spp.)
    bloom: vko 15-18
    nectar_score: 3
    note: Kriittinen kevätravinto
    source: src:HOR3
  - plant: Vadelma
    bloom: vko 25-28
    nectar_score: 3
    source: src:HOR3
  pest_indicators:
  - symptom: Kellastuvat lehdet, rullautuvat
    cause: Kirvat tai ravinnepuute (N/Fe)
    action: Tarkista lehden alapinta, testaa maaperä
    source: src:HOR1
  - symptom: Valkoinen härmä lehtien päällä
    cause: Härmäsieni
    action: Ilmankierron parantaminen, tarvittaessa biosidi
    source: src:HOR1
- table_id: TBL_INVASIVE
  title: Vieraslajit
  rows:
  - name: Komealupiini (Lupinus polyphyllus)
    action: Katko kukinnot ennen siementämistä (heinäkuu). Juurakoiden kaivaminen. [src:HOR2]
  - name: Kurtturuusu (Rosa rugosa)
    action: Lakisääteinen hävittämisvelvollisuus. Merkitse löydökset heti. [src:HOR2]
COMPLIANCE_AND_LEGAL:
- Vieraslajilaki (1709/2015) velvoittaa kiinteistön omistajaa hävittämään haitalliset vieraslajit. Laiminlyönti voi johtaa
  viranomaistoimiin [src:HOR2].
UNCERTAINTY_NOTES:
- 'NDVI-arvojen tarkkuus RGB-kameroilla ilman NIR-sensoreita. VALUE: UNKNOWN. TO_VERIFY: Vertailu manuaaliseen klorofyllimittaukseen.'
