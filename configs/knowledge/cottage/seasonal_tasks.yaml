      - "Install mouse guard at hive entrance"
    risk_factors_fi: ["talvivarantojen puute", "hiiri", "myöhäinen ruokinta"]
    keywords: ["syyskuu", "september", "syksy", "autumn", "syystarkastus", "autumn inspection", "hiirisuoja", "mouse guard", "sokerisiirappi", "sugar syrup", "loppuruokinta"]

  - month: 10
    month_name_fi: Lokakuu
    month_name_en: October
    season_fi: Syksy / Talveen valmistautuminen
    season_en: Late Autumn
    tasks_fi:
      - "Viimeinen tarkastus ennen talvea — pesyen lopettaminen (vähäinen pesye OK)"
      - "Talvipakkauksien asennus — tuulensuoja, kosteudenpoisto"
      - "Varroa-käsittely hapetoinnilla emottomana aikana (tehokkain tulos)"
      - "Kirjaa ylös pesän tila, ruokamäärä, emon ikä talvikortille"
    tasks_en:
      - "Final autumn inspection — end of brood OK, check food stores"
      - "Install winter insulation — wind protection and moisture control"
      - "Oxalic acid vaporization when broodless (most effective treatment)"
      - "Record hive status, food stores, queen age on winter card"
