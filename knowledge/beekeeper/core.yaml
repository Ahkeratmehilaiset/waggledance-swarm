header:
  agent_id: beekeeper
  agent_name: Beekeeper (Head Apiarist)
  version: 1.0.0
  last_updated: '2026-02-21'
ASSUMPTIONS:
- 'JKH Service (Y-tunnus: 2828492-2), omistaja Jani Korpi'
- 'Evira tilatunnus: 18533284'
- 202 yhdyskuntaa, 35 tarhapaikka (2024 talvehtineet)
- 'Rodut: italMeh (italialainen) ja grnMeh (krainilainen/carnica)'
- 'Alueet: Tuusula (36), Helsinki (20), Vantaa (16), Espoo (66), Polvijärvi (3), Kouvola (61)'
- 'Vuosituotanto: noin 10 000 kg hunajaa (vaihtelee vuosittain)'
- 'Hoitomalli: Langstroth-kehykset'
- 'Täysi pesärekisteri: agents/tarhaaja/apiaries.yaml'
- 'Biologinen tietokanta: agents/tarhaaja/bee_biology.yaml'
- 'Kasvikalenteri: agents/tarhaaja/flora_calendar.yaml'
DECISION_METRICS_AND_THRESHOLDS:
  varroa_threshold_per_100:
    value: 3
    action: '>3 punkkia/100 mehiläistä → kemiallinen hoito välittömästi'
    source: src:TAR1
  colony_weight_spring_min_kg:
    value: 15
    action: Alle 15 kg keväällä → hätäruokinta sokeriliuoksella (1:1)
    source: src:TAR2
  winter_cluster_core_temp_c:
    value: 20
    action: 'Ydinlämpö <20°C → KRIITTINEN: yhdyskunta heikkenee'
    source: src:TAR2
  brood_frame_count_spring_min:
    value: 3
    action: Alle 3 sikiökehystä huhtikuussa → pesä heikko, yhdistämisharkinta
    source: src:TAR2
  honey_moisture_max_pct:
    value: 18.0
    action: Yli 18% → ei linkota, anna kuivua kannessa
    source: src:TAR2
  swarming_risk_indicators:
    value: Emokopat, pesä ahdas, nuoret mehiläiset kaarella
    action: Jaa pesä tai poista emokopat 7pv välein
    source: src:TAR2
  feeding_autumn_sugar_kg:
    value: 15-20 kg sokeria / pesä (vyöhyke II-III)
    source: src:TAR2
  deg_day_threshold_feeding_start:
    value: Alle 1000 °Cvr → aloita syysruokinta viimeistään vko 34
    source: src:TAR2
  varroa_infestation_pct:
    value: 3
    unit: '%'
    source: src:TAR1
    action: Välitön kemiallinen torjunta (oksaalihappo/muurahaishappo)
    measurement: Tomusokeritesti / Alkoholipesu (~300 mehiläistä)
    season: Elokuu kriittinen
  winter_food_kg:
    value: 15-25
    unit: kg
    source: src:TAR2
    action: Alle 15 kg = kuolemanvaara keväällä. Optimi 20-25 kg.
  brood_temp_c:
    value: 34.5-35.5
    unit: °C
    source: src:TAR2
    action: Alle 34.0°C = kalkkisikiöriski. Yli 36.0°C = ylikuumeneminen.
  flight_temp_c:
    value: 10-12 minimi, 15-25 optimi
    source: UNKNOWN
    action: 'Yli 35-38°C: lennot pysähtyvät, jäähdytysvettä tarvitaan.'
SEASONAL_RULES:
- season: Kevät (maalis-toukokuu)
  rule: 'Talvimehiläiset korvaantuvat kesämehiläisillä. Sikiöinnin käynnistyminen. Seuraa ruokavarastoja (nälkäkuolemat).
    Kevätkasvit: pajut, vaahtera, voikukka.'
- season: Alkukesä (touko-kesäkuu)
  rule: 'Parveiluvaara! Kuhnurihaudonnan leikkaus (varroan mekaaninen torjunta). Medikehysten lisäys. Kasvit: omena, kirsikka.'
- season: Pääsato (kesä-heinäkuu)
  rule: Vadelma, horsma, rypsi, apila. Linkoukset. Seuraa sääennustetta (kosteus = mettä).
- season: Loppukesä (elo-syyskuu)
  rule: 'KRIITTINEN: Varroa-tarkistus ja torjunta. Talvimehiläisten kasvu. Kuhnurisota. Kanervasato. Muurahaishappo.'
- season: Syksy (loka-marraskuu)
  rule: Oksaalihappokäsittely (sikiötön aika). Talviruuan tarkistus. Pesien eristys. Hiiriensuojaus.
- season: Talvi (joulu-helmikuu)
  rule: 'Ei avata pesiä. Seuraa painoja (vaa''at). Talvipallo 20°C ydin. Kuuntele: hiljainen humina = OK.'
FAILURE_MODES:
- failure: Orpoontuminen (kuningatar kuollut)
  recovery: Yhdistä viereiseen pesään lehtipaperilla tai anna uusi emo/emokenno.
- failure: AFB-epäily (mätätauti)
  recovery: HETI kunnaneläinlääkärille ilmoitus. ÄLÄ siirrä kehyksiä pesien välillä. Valvottava eläintauti.
- failure: Varroa-romahdus (DWV-oireet)
  recovery: Pikakäsittely oksaalihapolla. Seuraa talvimehiläisten kuntoa. Harkitse yhdistämistä.
- failure: Nälkäkuolema (kevät)
  recovery: 'Hätäruokinta: sokerisiirappi 1:1 tai fondantti suoraan kehysten päälle.'
PROCESS_FLOWS:
  annual_cycle:
    steps:
    - 'Maalis: kevättarkastus (ruokavarastot, emo, sikiö)'
    - 'Huhti-touko: laajentaminen, korotukset, emontarkkailu'
    - 'Kesä-heinä: hunajalinkoaminen, parveilunhallinta'
    - 'Elo: viimeinen lintaus, varroa-hoito, syysruokinta alkaa'
    - 'Syys: ruokinta valmis viim. syyskuun loppu, talvipakkaus'
    - 'Loka-maalis: talvilevo, painonseuranta, ei avata pesiä'
KNOWLEDGE_TABLES:
  apiaries:
  - location: Huhdasjärvi
    hive_count: ~50
    zone: II-III
    main_flora: Maitohorsma, vadelma, apilat
    source: src:TAR2
  - location: Kouvolan alue
    hive_count: ~100
    zone: II
    main_flora: Rypsi, vadelma, hedelmäpuut
    source: src:TAR2
  - location: Helsinki/Itäkeskus
    hive_count: ~50
    zone: I
    main_flora: Puistokasvit, lehmukset, apilat
    source: src:TAR2
  - location: Muut sijainnit
    hive_count: ~100
    zone: I-III
    main_flora: Vaihteleva
    source: src:TAR2
COMPLIANCE_AND_LEGAL:
  registration: Eläintenpitäjäksi rekisteröityminen Ruokavirastoon pakollinen [src:TAR1]
  afb_notification: AFB on valvottava eläintauti — aina ilmoitus Ruokavirastolle [src:TAR1]
  honey_direct_sale: Suoramyynti kuluttajalle max 2500 kg/vuosi ilman huoneistoilmoitusta [src:TAR3]
  vat: Hunaja ALV 13.5% (elintarvike, 1.1.2026 alkaen) [src:TAR3]
UNCERTAINTY_NOTES:
- Varroa-kynnys 3/100 on yleisesti käytetty mutta ei absoluuttinen — hoidon ajoitus riippuu myös vuodenajasta.
- Talviruokinnan tarve vaihtelee pesän vahvuuden ja syksyn satokauden mukaan.
