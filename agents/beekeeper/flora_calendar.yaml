# Suomen mesi- ja siitepölykasvit — Operatiivinen tietokanta
# Vyöhykkeet I-VIII, kukintaviikot Etelä-/Keski-Suomi
# M=Mesi, S=Siitepöly, Arvo 1-3

saaennot:
  lampotilasaanto: "Pääsatokasvit vaativat >=18°C. Lentely alkaa +12°C."
  kosteussaanto: "Kuiva helle = painajainen. Optimi: lämmin, hiostava, ukkosaltis."
  kiteytymissaanto: "Glukoosia/fruktoosia suhde. Rypsi/voikukka: viikot. Kanerva: kuukausia."

kevat_vk14_23:
  tarkoitus: "Siitepölyä ja mettä sikiöinnin käynnistämiseen"
  kasvit:
    - {laji: "Pajut (Salix spp.)", vyohyke: "I-VIII", vk: "14-20", M: 2, S: 3, saa: ">8-10°C lentokeli", hunaja: "Keltaista, nopeasti kiteytyvää. Kulutetaan kevätkehitykseen."}
    - {laji: "Lepät (Alnus spp.)", vyohyke: "I-VIII", vk: "12-16", M: 0, S: 2, saa: "Tuulipölytteinen", hunaja: "Ei tuota mettä."}
    - {laji: "Vaahtera (Acer platanoides)", vyohyke: "I-IV", vk: "18-21", M: 3, S: 2, saa: ">15°C, tyyntä", hunaja: "Vaalea, miedon makuinen. Voi antaa kevätsadon."}
    - {laji: "Voikukka (Taraxacum)", vyohyke: "I-VIII", vk: "19-24", M: 2, S: 3, saa: ">15°C, aurinkoa", hunaja: "Keltainen, karvas, erittäin nopea kiteytyminen."}
    - {laji: "Omena (Malus domestica)", vyohyke: "I-V", vk: "20-23", M: 2, S: 2, saa: ">15°C tyyntä", hunaja: "Vaalea, hedelmäinen."}
    - {laji: "Kirsikka/Luumu (Prunus spp.)", vyohyke: "I-III", vk: "19-22", M: 2, S: 2, saa: "Herkkä halloille", hunaja: "Vaalea, mantelinen."}
    - {laji: "Mustikka (Vaccinium myrtillus)", vyohyke: "I-VIII", vk: "19-23", M: 2, S: 1, saa: "Herkkä yöpakkasille", hunaja: "Punertava, mieto."}

kesa_paasato_vk24_33:
  tarkoitus: "Kaupallinen hunajasato"
  kasvit:
    - {laji: "Vadelma (Rubus idaeus)", vyohyke: "I-VIII", vk: "24-28", M: 3, S: 2, saa: "Sadetta ennen, lämpöä kukinnan aikana", hunaja: "Suomen suosituin lajihunaja. Vaalea, hedelmäinen."}
    - {laji: "Rypsi/Rapsi (Brassica)", vyohyke: "I-V", vk: "25-30", M: 3, S: 3, saa: "Erittää lähes aina, riittävä kosteus", hunaja: "Valkoinen, neutraali. Erittäin nopea kiteytyminen."}
    - {laji: "Valkoapila (Trifolium repens)", vyohyke: "I-VIII", vk: "25-33", M: 3, S: 2, saa: ">18-20°C, korkea yökosteus", hunaja: "Vesivaaleaa, hienorakeinen kidehunaja."}
    - {laji: "Maitohorsma (Chamaenerion angustifolium)", vyohyke: "I-VIII", vk: "27-33", M: 3, S: 2, saa: "Hellettä, ukkossäätä. Kuivassa tuulessa kuivuu.", hunaja: "Vesivaalea, hienostunut. Lumivalkoinen kide."}
    - {laji: "Hunajakukka (Phacelia)", vyohyke: "I-V (viljelty)", vk: "26-34", M: 3, S: 3, saa: "Kestää kuivuutta, erittää koko päivän", hunaja: "Kellertävää, mieto. Erinomainen laidunkasvi."}
    - {laji: "Valkomesikkä (Melilotus albus)", vyohyke: "I-V", vk: "28-34", M: 3, S: 2, saa: "Kestää kuivuutta (paalujuuri)", hunaja: "Vaalea, vaniljamainen."}
    - {laji: "Lehmus (Tilia cordata)", vyohyke: "I-III", vk: "28-30", M: 2.5, S: 1, saa: "Oikukas. >20°C hiostava.", hunaja: "Vihertävä, mentolinen/lääkemäinen."}
    - {laji: "Puna-apila (Trifolium pratense)", vyohyke: "I-VIII", vk: "26-33", M: 1, S: 3, saa: "Kukintaputki liian pitkä, paitsi kuivina kesinä", hunaja: "Tumma, voimakas."}

loppukesa_syksy_vk31_37:
  tarkoitus: "Myöhäinen sato + vitellogeniinin rakennusaineet talvimehiläisille"
  kasvit:
    - {laji: "Kanerva (Calluna vulgaris)", vyohyke: "I-VIII", vk: "31-36", M: 3, S: 1, saa: "Viileitä kasteisia öitä, lämpimiä päiviä", hunaja: "Meripihka, tiksotrooppinen (hyytelö). Erikoislinko. Ei kiteydy."}
    - {laji: "Tattari (Fagopyrum esculentum)", vyohyke: "I-IV", vk: "30-34", M: 2, S: 2, saa: "Erittää vain aamupäivisin 8-12", hunaja: "Musta, maltainen/siirappinen."}
    - {laji: "Kultapiisku (Solidago virgaurea)", vyohyke: "I-VIII", vk: "30-36", M: 1, S: 2, saa: "Kestää viilentymistä", hunaja: "Keltainen, voimakas tuoksu."}
    - {laji: "Syysmaitiainen (Leontodon autumnalis)", vyohyke: "I-VIII", vk: "31-37", M: 0, S: 3, saa: "Kukkii pitkälle syksyyn", hunaja: "ELINTÄRKEÄ siitepölylähde talvimehiläisten vitellogeniinille."}
    - {laji: "Ohdakkeet (Cirsium spp.)", vyohyke: "I-VI", vk: "28-34", M: 2, S: 2, saa: "Kestää kuivuutta", hunaja: "Vaalea, mieto, kirkas."}
