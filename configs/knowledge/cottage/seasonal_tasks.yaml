general_facts_fi:
  - "Suomen mehiläishoitokausi on noin 5-6 kuukautta (huhtikuu-syyskuu)"
  - "Varroa-käsittely on pakolliton vuosittain — laiminlyönti johtaa pesän kuolemaan 2-3 vuodessa"
  - "Talvivarannot: vähimmäissuositus 20 kg hunajaa tai vastaava sokerisiirappi"
  - "Emon uusiminen 2-3 vuoden iässä parantaa talvitumista ja tuottavuutta"
  - "Parveaminen on luonnollinen käyttäytyminen — esto vaatii aktiivista havainnointia"

general_facts_en:
  - "Finnish beekeeping season is approximately 5-6 months (April-September)"
  - "Annual varroa treatment is mandatory — neglect leads to colony death within 2-3 years"
  - "Winter stores minimum: 20 kg honey or equivalent sugar syrup"
  - "Queen replacement at age 2-3 years improves overwintering and productivity"
  - "Swarming is natural behavior — prevention requires active monitoring"
