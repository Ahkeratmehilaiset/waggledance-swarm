header:
  agent_id: core_dispatcher
  agent_name: Core/Dispatcher (Päällikkö)
  version: 1.0.0
  last_updated: '2026-02-21'
ASSUMPTIONS:
- Korvenrannan mökkiympäristö, Kouvola-Huhdasjärvi
- 50 agentin multi-agent-järjestelmä, Ollama + paikallinen LLM
- Käyttäjä on yksi henkilö (Jani), priorisoidaan hänen tavoitteitaan
DECISION_METRICS_AND_THRESHOLDS:
  agent_response_time_max_s:
    value: 30
    action: Jos agentti ei vastaa 30s → merkitse unresponsive, delegoi toiselle
    source: src:CORE1
  concurrent_active_agents_max:
    value: 8
    action: Yli 8 aktiivista → priorisoi ja pysäytä matalan prioriteetin agentit
    source: src:CORE1
  memory_db_size_max_mb:
    value: 500
    action: Yli 500 MB → aja muistin tiivistys ja vanhojen merkintöjen arkistointi
    source: src:CORE1
  heartbeat_interval_s:
    value: 30
    source: src:CORE1
  task_queue_max:
    value: 50
    action: Yli 50 odottavaa → hylkää matalan prioriteetin tehtävät
    source: src:CORE1
  event_bus_latency_ms:
    value: 500
    source: UNKNOWN
    action: Pudota matalan prioriteetin eventit.
    to_verify: End-to-end latenssi tuotantolaitteistolla.
  system_cpu_load_pct:
    value: 90% yli 60s
    source: UNKNOWN
    action: Rajoita videonkäsittelyä, laske FPS.
    to_verify: Rasitustesti + SLA.
  ups_battery_runtime_min:
    value: 30
    source: UNKNOWN
    action: Aja non-critical kontit alas.
    to_verify: UPS-kuormatesti.
  mqtt_queue_size:
    value: 1000
    source: UNKNOWN
    action: Tutki viestitulva, ÄLÄ automaattisesti restarttaa brokeria.
    to_verify: Mosquitto-mittarit.
  node_heartbeat_timeout_s:
    value: 120
    source: UNKNOWN
    action: Merkitse UNAVAILABLE, fallback.
    to_verify: Per-agentti heartbeat-interval.
SEASONAL_RULES:
- season: Talvi (marraskuu-maaliskuu)
  rule: Virransäästö ensisijainen. Sähkökatkossa pudota kaikki paitsi LVI ja pakkasmittarit.
- season: Kesä (kesä-elokuu)
  rule: Korkean IO-kuorman tila. Kamerat ja AI 100% teholla jäähdytyksen riittäessä.
FAILURE_MODES:
- failure: Network Partition
  recovery: Siirry lokaaliin tilakoneeseen. Älä hae pilvi-API:a ennen WAN-vahvistusta.
- failure: Database Corruption
  recovery: Pysäytä kirjoitus, lataa klo 03:00 snapshot RAM-levylle, jatka read-only.
PROCESS_FLOWS:
  message_routing:
    steps:
    - 1. Vastaanota käyttäjän viesti
    - 2. Tokenisoi ja tunnista avainsanat
    - 3. Pisteytetään agenttityypit keyword-matchilla
    - 4. Jos multi-agent → käynnistä rinnakkaiset kyselyt
    - 5. Kootaan vastaus ja palautetaan käyttäjälle
    source: src:CORE1
  escalation:
    levels:
    - INFO → normaali reititys
    - WARNING → priorisoi + ilmoita käyttäjälle
    - CRITICAL → keskeytä muut, käsittele heti
    source: src:CORE1
KNOWLEDGE_TABLES:
- priority_matrix:
  - category: Turvallisuus (palo, murtohälytys, karhuhavainto)
    priority: 1
    max_response_s: 5
  - category: Sää-hälytykset (myrsky, jää, tulva)
    priority: 2
    max_response_s: 10
  - category: Mehiläishoito (parveilu, tautiepäily)
    priority: 3
    max_response_s: 30
  - category: Kiinteistöhuolto (sähkö, LVI, rakenteet)
    priority: 4
    max_response_s: 60
  - category: Viihde, ruoka, yleistieto
    priority: 5
    max_response_s: 120
- table_id: TBL_PRIORITY
  title: Prioriteettitasot
  rows:
  - level: 1
    name: Hätä/Turvallisuus
    agents: Paloesimies, Lukkoseppä, Sähköasentaja
  - level: 2
    name: Ylläpito/Infra
    agents: LVI-asiantuntija, Laitehuoltaja
  - level: 3
    name: Operatiivinen
    agents: Tarhaaja, Luontokuvaaja
COMPLIANCE_AND_LEGAL:
  data_retention: Kaikki agenttidata säilytetään paikallisesti, ei pilvipalveluja
  gdpr_note: Henkilötietojen käsittely vain paikallisesti, ei jaeta kolmansille osapuolille
UNCERTAINTY_NOTES:
- Priorisointimatriisi on heuristinen, ei absoluuttinen. Käyttäjä voi ohittaa.
- Agenttien max-määrä riippuu käytettävissä olevasta VRAM/RAM-kapasiteetista.
SOURCE_REGISTRY:
  sources:
  - id: src:CORE1
    org: OpenClaw
    title: HiveMind System Architecture v2
    year: 2026
    url: null
    supports: Järjestelmäarkkitehtuuri, priorisointisäännöt, heartbeat-protokolla.
  - id: src:COR1
    org: SFS
    title: SFS-EN IEC 62443 Teollisuusautomaation tietoturva
    year: 2021
    url: N/A
    identifier: SFS-EN IEC 62443
    supports: Automaatiojärjestelmän vikasietoisuus ja looginen segmentointi.
  - id: src:COR2
    org: Home Assistant
    title: 'Developer Docs: Architecture (overview)'
    year: 2025
    url: https://developers.home-assistant.io/docs/architecture/
    supports: Yleiskuva arkkitehtuurista (core, integrations, event loop). Ei numeerisia latenssikynnyksiä.
