title: Saadokset
agent: Jätevesijärjestelmä
facts:
- 'Valtioneuvoston asetus 157/2017: haja-asutuksen jätevesien käsittely'
- Rannan läheisyydessä (<100m) tiukemmat puhdistusvaatimukset
- 'Poikkeus: yli 68-vuotiaat vakituisesti asuvat'
- Kunta voi myöntää lykkäystä enintään 5 vuotta
FINNISH_REGULATIONS:
- law: Ympäristönsuojelulaki 527/2014
  requirement: Jätevesien puhdistusvaatimus haja-asutusalueilla
  source: YSL
- law: Valtioneuvoston asetus 157/2017
  requirement: Orgaaninen aines -80%, fosfori -70%, typpi -30%
  source: VNA
- law: Siirtymäaika
  requirement: 'Ennen 2004 rakennetut: kunnostus 31.10.2019 mennessä (poikkeukset yli 68v)'
  source: VNA
- law: Ranta-alue 100m
  requirement: Tiukemmat vaatimukset vesistön rannalla (<100m)
  source: YSL
SYSTEM_COSTS_EUR:
  umpikaivo_emptying: 150-300 €/tyhjennys
  biofilter_installation: 5000-8000 €
  pienpuhdistamo: 8000-15000 € + huolto 300-500 €/v
  maasuodattamo: 5000-10000 € + hoitotarkastus 200 €/v
