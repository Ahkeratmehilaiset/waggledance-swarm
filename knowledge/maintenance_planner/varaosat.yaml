  - "Vuokravaraosat: kalliit, harvoin tarvittavat osat lainattavissa toimittajalta tai verkostosta"
  - "Varaosien poistohallinta: vanhentuneet, käyttökelvottomat tai obsoleetit osat kirjattava alas vuosittain"
  - "Toimitusajan hallinta: hätätilauksen kustannus 3–10x normaalihinnan, ennakointi maksaa itsensä takaisin"
