header:
  agent_id: energy_manager
  agent_name:  Factory Energy Manager
  name_fi: 'Tehdasenergian hallinta'
  version: 1.0.0
  last_updated: '2026-03-02'
profiles:
  - factory
priority: medium
ASSUMPTIONS:
- Teollisuuslaitos, ISO 50001 energianhallintajärjestelmä suositeltava
- JKH Servicen hunajankäsittelytila ja tarhat kuluttavat sähköä (linko, lämmitys, pumput)
- Sähkön spot-hinta vaihtelee tunneittain Nordpool-pörssissä
- Mökin Huhdasjärvellä lämmitys öljy/sähkö/puu — energiakustannus relevantti
- Aurinkopaneelien hankinta harkinnassa (tiedetään asiayhteys)
DECISION_METRICS_AND_THRESHOLDS:
  power_factor_min:
    value: 0.95
    action: "<0.95 → loistehomaksu kasvaa; asenna kondensaattoriparisto tai taajuusmuuttaja"
    source: src:EM1
  air_leak_pct:
    value: 10
    action: ">10% paineilmavuotoja → vuotokartoitus ultraäänilaitteella, korjaa välittömästi"
    source: src:EM1
  spot_price_alert_eur_mwh:
    value: 150
    action: ">150 €/MWh → siirrä ei-kriittiset kuormat (lämminvesivaraaja, linkous) halvempaan
      tuntiin"
    source: src:EM2
  energy_intensity_kwh_kg:
    value: 0.8
    action: ">0.8 kWh/kg tuotetta → prosessin energiatehokkuustarkastus, vertaa benchmarkiin"
    source: src:EM1
  hvac_setpoint_deviation_c:
    value: 2
    action: ">2°C poikkeama HVAC-asetuspisteestä → huoltotilaus, tarkista suodattimet"
    source: src:EM1
  monthly_kwh_budget:
    value: 5000
    action: ">5000 kWh/kk teollisuustilassa → kustannusseuranta, selvitä hukkakäyttö yöaikaan"
    source: src:EM1
  solar_roi_years:
    value: 10
    action: ">10 vuoden takaisinmaksuaika aurinkovoimalle → uudelleenarviointi tai odota
      halvempia paneeleja"
    source: src:EM3
SEASONAL_RULES:
- season: Kevät
  action: "Lämmityskauden päättyessä vaihda HVAC kesätilaan. Tarkista lämpöpumpun
    kylmäaine ja suorituskyky. Sähkösopimuksen tarkistus — spot-sopimus vs. kiinteä
    hinta kesäksi. Aurinkovoimatuoton kasvu alkaa — optimoi omakäyttö."
  source: src:EM3
- season: Kesä
  action: "Linkous ja hunajankäsittely kuormittavat sähköverkkoa — ajoita halvimmille
    spot-tunneille. Mökillä aurinkopaneelit tuottavat eniten — seuraa nettotuottoa.
    Viilennystarpeen hallinta: älä jäähdytä alle tarpeen (asetuspiste +2°C riittää)."
  source: src:EM2
- season: Syksy
  action: "Lämmityskausi alkaa — ennusta sähkökustannus lämmityskaudelle. Öljy- tai
    pellettilämmittimen vuosihuolto. Lisäeristys tarkistettava mökin energiatehokkuuden
    parantamiseksi. Spot-sopimuksen edut talvella — seuraa hintapiikkejä."
  source: src:EM2
- season: Talvi
  action: "Hintapiikkien vaara (joulukuu–helmikuu). Aktivoi kuormanhallinta: siirrä
    kaikki siirrettävissä olevat kuormat yölle tai viikonloppuihin. Mökin lämpötila
    min. +5°C putkirikon ehkäisemiseksi. Energiakatsaus: verkkoon palautettu vs.
    ostettu sähkö."
  source: src:EM2
FAILURE_MODES:
- mode: Sähkökatkos tuotannon aikana
  detection: "UPS-hälytys, tuotantolaitteet pysähtyvät, generaattori ei käynnisty
    automaattisesti"
  action: "Aktivoi varavoima (aggregaatti). Tallenna tuotantotiedot manuaalisesti.
    Ilmoita verkonhaltijalle. Tarkista jälkikäteen UPS-akut ja generaattorin automaattikäynnistys."
  source: src:EM1
- mode: Energiakustannusten odottamaton kasvu
  detection: "Kuukausilaskussa yli 30% ylitys budjetista ilman selkeää syytä"
  action: "Analysoi tuntitason kulutusdata. Tarkista yöaikainen standby-kulutus.
    Selvitä, onko laite jäänyt päälle (linko, kompressori, lämmitysvastuslangat)."
  source: src:EM1
- mode: Paineilmajärjestelmän suuri vuoto
  detection: "Kompressori käy jatkuvasti ilman kuormaa, paine ei pysy asetuspisteessä"
  action: "Sulje linjat osasto kerrallaan vuotopaikan paikantamiseksi. Ultraäänikartoitus
    seuraavana arkipäivänä. Vuoto yli 10% = välitön korjaus."
  source: src:EM1
PROCESS_FLOWS:
  energianhallintasykli:
    steps:
    - 'Tammi: edellisen vuoden energiakatsaus, benchmark teollisuuteen'
    - 'Helmi: kuormanhallinnan päivitys spot-hintojen perusteella'
    - 'Maalis-huhti: HVAC kesätila, lämpöpumpun huolto'
    - 'Touko: aurinkopaneelien tuotantokauden seuranta alkaa'
    - 'Kesä-heinä: linkauksen ajoitus halvimmille spot-tunneille'
    - 'Elo: energiatehokkuuskatsaus puolivuosittain'
    - 'Syys: lämmityskauden valmistelu, öljyvarasto/puu täyteen'
    - 'Loka-marras: talven hintapiikkistrategia, kuormanhallinta'
    - 'Joulu: vuosiraportti, seuraavan vuoden energiabudjetti'
COMPLIANCE_AND_LEGAL:
  iso50001: "ISO 50001:2018 — energianhallintajärjestelmä suositeltava yli 250 hlön
    yrityksille; pienemmille vapaaehtoinen mutta tukee energiaverotuksen palautuksia [src:EM1]"
  sahkovero: "Teollisuuden alennettu sähköveroluokka II: 0,0063 €/kWh (2026).
    Edellyttää, että sähkö käytetään teollisuusprosessissa [src:EM1]"
  aurinkopaneelit: "Alle 50 kVA verkkoliitynnässä ei vaadi erillistä lupaa. Ylijäämäsähkön
    myynti: ALV 25,5% myyjälle ellei alle 15 000 € raja ylity [src:EM3]"
UNCERTAINTY_NOTES:
- "Spot-hintaennusteet ovat suuntaa antavia — todelliset huippuhinnat voivat poiketa merkittävästi."
- "Aurinkopaneelien takaisinmaksuaika riippuu asennuskulmasta, sijainnista ja sähkön hinnasta."
