domain: cottage
version: "1.1"
description: "Off-grid property management — heating, frost protection, seasonal maintenance"
default_fallback: llm_reasoning

layers:
  rule_constraints:
    enabled: true
    priority: 1
  model_based:
    enabled: true
    priority: 2
  statistical:
    enabled: true
    priority: 3
  retrieval:
    enabled: true
    priority: 4
  llm_reasoning:
    enabled: true
    priority: 5

key_decisions:
  - id: heating_cost
    question: "Paljonko lämmitys maksaa?"
    keywords: ["lämmitys", "heating", "kustannus", "cost", "energi", "kwh"]
    primary_layer: model_based
    model: heating_cost
    inputs: [spot_price, outdoor_temp, indoor_temp, area_m2, R_value]
    fallback: llm_reasoning

  - id: frost_protection
    question: "Pitääkö putkia suojata pakkaselta?"
    keywords: ["pakkanen", "frost", "putki", "pipe", "jäätyä", "freeze"]
    primary_layer: rule_constraints
    rules: [frost_pipe_check, frost_outdoor_threshold]
    fallback: llm_reasoning

  - id: seasonal_task
    question: "Mitä pitää tehdä nyt?"
    keywords: ["tehtävä", "kausi", "season", "kuukausi", "month"]
    primary_layer: retrieval
    fallback: llm_reasoning

  - id: water_system
    question: "Onko vesijärjestelmä kunnossa?"
    keywords: ["vesi", "water", "pumppu", "pump", "kaivo", "well", "paine", "pressure"]
    primary_layer: rule_constraints
    rules: [water_pressure_check]
    fallback: llm_reasoning

  - id: energy_consumption
    question: "Paljonko sähköä kuluu?"
    keywords: ["sähkö", "electricity", "kulutus", "consumption", "watti", "watt"]
    primary_layer: statistical
    model: energy_baseline
    inputs: [daily_kwh, outdoor_temp, heating_mode]
    fallback: llm_reasoning

rules:
  - id: frost_pipe_check
    condition: "outdoor_temp < -5 and pipe_insulated == False"
    action: alert
    severity: high
    message_fi: "Putket voivat jäätyä! Ulkolämpötila alle -5°C eikä putkia ole eristetty."
    message_en: "Pipes may freeze! Outdoor temperature below -5°C and pipes are not insulated."

  - id: frost_outdoor_threshold
    condition: "outdoor_temp < -20"
    action: alert
    severity: critical
    message_fi: "Ankara pakkanen ({outdoor_temp}°C) — tarkista kaikki vesiputket ja lämmitys."
    message_en: "Severe frost ({outdoor_temp}°C) — check all water pipes and heating."

  - id: water_pressure_check
    condition: "water_pressure_bar < 1.0"
    action: alert
    severity: medium
    message_fi: "Vedenpaine alhainen ({water_pressure_bar} bar). Tarkista pumppu."
    message_en: "Water pressure low ({water_pressure_bar} bar). Check pump."

models:
  - id: heating_cost
    type: model_based
    axiom_file: "configs/axioms/cottage/heating_cost.yaml"

  - id: energy_baseline
    type: statistical
    description: "Baseline energy consumption model for off-grid property"

data_sources:
  - id: spot_price
    type: api
    url: "https://api.porssisahko.net/v1/latest-prices.json"
    unit: "c/kWh"

  - id: outdoor_temp
    type: sensor
    source: fmi_weather
    unit: "°C"
