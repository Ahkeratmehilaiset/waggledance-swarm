priority: medium
ASSUMPTIONS:
- Suomalainen asunto-osakeyhtiö (AOYL 2009)
- Jani Korpin omistama asunto Helsingissä
- JKH Service Y-tunnus 2828492-2 voi olla osakkaan roolissa
- Taloyhtiöllä hallitus, isännöitsijä ja tilintarkastaja
DECISION_METRICS_AND_THRESHOLDS:
  maintenance_increase_pct:
    value: 15
    action: ">15% vastikkeen korotus yhteen vuoteen → vaadi kirjallinen selvitys hallitukselta ja isännöitsijältä"
    source: src:AB1
  renovation_loan_share_eur:
    value: 20000
    action: ">20 000 € lainaosuus → selvitä maksusuunnitelma tai harkitse lainaosuuden maksaminen pois kerralla"
    source: src:AB1
  board_response_days:
    value: 14
    action: "Kirjallinen reklamaatio → hallituksella 14 vrk vastausaika ennen jatkotoimia"
    source: src:AB1
  water_damage_report_hours:
    value: 24
    action: "Vesivaurio → ilmoitus isännöitsijälle 24 tunnin kuluessa, muuten omavastuuriski kasvaa"
    source: src:AB2
  agm_notice_days:
    value: 14
    action: "Yhtiökokous kutsuttava vähintään 14 vrk etukäteen (AOYL 6:20)"
    source: src:AB1
  capital_expenditure_limit_pct:
    value: 5
    action: ">5% talonyhtiön budjetista yksittäinen hankinta → vaatii yhtiökokouksen hyväksynnän"
    source: src:AB1
  noise_complaint_response_days:
    value: 7
    action: "Meluhäiriöilmoitus → taloyhtiöllä 7 vrk reagointiaika ennen jatkotoimia (järjestyssäännöt)"
    source: src:AB3
SEASONAL_RULES:
- season: Kevät
  action: "Maaliskuu–toukokuu: tarkista talven jälkeiset vauriot (katto, putket, julkisivu). Kevätyhtiökokous on pidettävä kuuden kuukauden kuluessa tilikauden päättymisestä. Tarkista tilinpäätös ja vastikebudjetti."
  source: src:AB1
- season: Kesä
  action: "Kesäkuu–elokuu: rakennusremonttien paras aika. Seuraa mahdollisia putkiremontti- tai julkisivukorjausilmoituksia. Tarkista parvekkeiden kunto ennen suvea."
  source: src:AB1
- season: Syksy
  action: "Syyskuu–marraskuu: lämmitysjärjestelmän käynnistys, tarkista lämpöpatterit ja termostaatit. Budjettikokous usein syksyllä — seuraa vastike-ehdotuksia."
  source: src:AB1
- season: Talvi
  action: "Joulukuu–helmikuu: tarkista ikkunoiden tiivisteet, pattereiden toiminta. Lumen ja jään poisto katolta on taloyhtiön vastuulla — ilmoita havaituista vaaroista välittömästi."
  source: src:AB2
FAILURE_MODES:
- mode: Vesivaurio asunnossa
  detection: "Kosteusjäljet katossa tai seinissä, valuva vesi, turpoava parketti"
  action: "1. Sulje vesisulku. 2. Ilmoita isännöitsijälle kirjallisesti 24h kuluessa. 3. Ota valokuvat. 4. Pyydä kosteuskartoitus. Älä tee omatoimisia korjauksia ennen katselmoinnista."
  source: src:AB2
- mode: Hallitus ei reagoi reklamaatioon
  detection: "Kirjallinen valitus jäänyt ilman vastausta yli 14 vrk"
  action: "Lähetä muistutus kirjallisesti. Jos ei vastausta 7 vrk kuluessa, ota yhteys Suomen Kiinteistöliiton neuvontaan tai kuluttajaneuvontaan. Äärimmäisenä keinona yhtiökokouksen koollekutsuminen 1/10 osakkaista."
  source: src:AB1
- mode: Yllättävä suuri remontti-ilmoitus
  detection: "Isännöitsijäntodistuksessa ei mainintaa, yllättävä hankesuunnitelma saapuu"
  action: "Vaadi hankesuunnitelma, kustannusarvio ja rahoitussuunnitelma kirjallisena. Tarkista onko yhtiökokouspäätös tehty asianmukaisesti. Konsultoi tarvittaessa kiinteistöjuridiikan asiantuntijaa."
  source: src:AB1
PROCESS_FLOWS:
  annual_cycle:
    steps:
    - 'Tammi–helmikuu: kerää koko vuoden vastike- ja hoitokulutiedot, tarkista tilinpäätös'
    - 'Maalis–huhti: kevätyhtiökokous (6kk tilikauden päättymisestä), tilinpäätöksen vahvistus'
    - 'Huhti–kesä: remontti-ilmoitusten seuranta, parveketarkastus, piha-alueet kuntoon'
    - 'Heinä–elo: kesäremontit käynnissä, valvo toteutusta ja aikataulua'
    - 'Syys: budjettikokous, vastikepäätökset seuraavalle vuodelle'
    - 'Loka–marras: lämmitysjärjestelmä, ikkunat, talvivalmistelut'
    - 'Joulu: tarkista taloyhtiön toimintakertomus ja seuraavan vuoden suunnitelmat'
COMPLIANCE_AND_LEGAL:
  aoyl: "Asunto-osakeyhtiölaki (AOYL 2009/1599) — osakkaan oikeudet ja velvollisuudet [src:AB1]"
  isannoitsijantodistus: "Isännöitsijäntodistus pakollinen asuntokaupassa — tarkista aina lainaosuudet, remonttisuunnitelmat ja vastiketasot [src:AB1]"
  hallituksen_vastuu: "Hallituksen jäsenet vastaavat huolimattomuudesta — dokumentoi kaikki reklamaatiot kirjallisesti [src:AB1]"
  remontit: "Osakkaan muutostyöt: ilmoitusvelvollisuus hallitukselle ennen töiden aloittamista. Kosteuseristystyöt vaativat kirjallisen luvan [src:AB2]"
UNCERTAINTY_NOTES:
- "Vastikkeen korotuskynnys 15% on suuntaa-antava — laissa ei ole tarkkaa prosenttirajaa, mutta merkittävä korotus vaatii aina perustelut."
- "Remonttivastuun jako (yhtiö vs. osakas) vaihtelee taloyhtiökohtaisten järjestysmääräysten mukaan."
