      - "Ruokavaranto: mittaa kehikoiden paino tai arvioi hunajamäärä"
      - "Tarvittaessa loppuruokinta sokerisiirappi 2:1 — viimeistään 15.9"
      - "Hiirisuoja lentoaukkoon — hiiri voi pesiytyä pesään talveksi"
    tasks_en:
      - "Autumn inspection: brood declining, winter cluster forming"
      - "Check food reserves: weigh combs or estimate honey stores"
