header:
  agent_id: nature_photographer
  agent_name: Luontokuvaaja (PTZ-operaattori)
  version: 1.0.0
  last_updated: '2026-02-21'
ASSUMPTIONS:
- PTZ (Pan-Tilt-Zoom) IP-kamera ulkona, Korvenrannan pihapiirissä
- ONVIF-yhteensopiva, RTSP-striimi saatavilla
- Kuvankäsittely paikallisesti (YOLO/ONNX tai vastaava)
- Tallennus paikalliselle NAS:lle tai SD-kortille
DECISION_METRICS_AND_THRESHOLDS:
  motion_detection_sensitivity:
    value: Medium (50-70%)
    note: Liian herkkä → puiden liike aiheuttaa väärähälytyksiä
    source: src:LK1
  object_detection_confidence_min:
    value: 0.6
    action: Alle 0.6 → ei tallenneta havaintona, logiin kuitenkin
    source: src:LK1
  fps_recording:
    value: 15
    note: Eläinhavainto-tallennukseen riittävä, säästää levytilaa
    source: src:LK1
  night_ir_switch_lux:
    value: 10
    action: Alle 10 lux → vaihda IR-tilaan automaattisesti
    source: src:LK1
  storage_retention_days:
    value: 30
    action: Yli 30 pv → poista ei-merkityt tallenteet
    source: src:LK1
  ptz_preset_return_timeout_s:
    value: 300
    action: 5 min inaktiviteetin jälkeen → palaa kotipositioon
    source: src:LK1
  object_confidence_pct:
    value: 85
    source: UNKNOWN
    action: Kytke Autotracking.
    to_verify: Frigate-konfiguraatio + testidata.
  object_dwell_time_s:
    value: 5
    source: UNKNOWN
    action: Tallenna Event Clip + notifikaatio.
  ptz_movement_latency_ms:
    value: 300
    source: UNKNOWN
    action: RelativeMove → Presets.
    to_verify: PTZ-viive kohdeverkossa.
  camera_ambient_temp_c:
    value: -10
    source: UNKNOWN
    action: Linssinlämmitin + nopeutta 50%.
    to_verify: Kameran datasivu.
  frame_drop_rate_pct:
    value: 10
    source: UNKNOWN
    action: 4K→1080p.
    to_verify: RTSP drop-mittaus.
SEASONAL_RULES:
- season: Talvi (marraskuu-maaliskuu)
  rule: WDR HIGH, IR-suodatin klo 15:30. Lumen heijastus sokaisee AI:n.
- season: Kesä (kesä-elokuu)
  rule: Hyönteisparveilu IR-valojen edessä = vääriä hälytyksiä. Ulkoinen IR päälle, kameran oma IR pois.
FAILURE_MODES:
- failure: PTZ Motor Stall
  recovery: ONVIF GotoHomePosition + kalibrointisykli.
- failure: API Timeout / MQTT Disconnect
  recovery: Pysäytä PTZ-liikkeet HETI (ei pyöri ääriasentoon).
PROCESS_FLOWS:
  animal_detection:
    steps:
    - 1. Motion trigger → aloita tallennus
    - 2. Aja YOLO-tunnistus ensimmäiselle framelle
    - 3. Jos eläin tunnistettu (confidence >0.6) → tallenna luokka ja timestamp
    - 4. Seuraa kohteen liikettä PTZ:llä (auto-track)
    - 5. Kohteen poistuessa → palaa preset-positioon
    - 6. Ilmoita ornitologille/riistanvartijalle lajin mukaan
    source: src:LK1
  timelapse:
    interval_min: 10
    duration_h: 24
    use_case: Vuodenaikojen seuranta, pilvimuodostumat, auringonnousu/-lasku
    source: src:LK1
KNOWLEDGE_TABLES:
- camera_presets:
  - preset: 1
    name: Lintulautakuva
    pan: 45
    tilt: -10
    zoom: 3
  - preset: 2
    name: Pesäpanoraama (mehiläistarha)
    pan: 120
    tilt: -5
    zoom: 1
  - preset: 3
    name: Järvinäkymä
    pan: 200
    tilt: 0
    zoom: 2
  - preset: 4
    name: Piha-alue (turvallisuus)
    pan: 0
    tilt: -15
    zoom: 1
  - preset: 5
    name: Taivasnäkymä (revontulet/tähtikuvat)
    pan: 180
    tilt: 60
    zoom: 1
  detection_classes:
  - class: bird
    notify: ornitologi
    priority: 3
  - class: bear
    notify: pesaturvallisuus + core_dispatcher
    priority: 1
  - class: deer
    notify: riistanvartija
    priority: 4
  - class: person
    notify: pihavahti
    priority: 2
  - class: fox
    notify: riistanvartija
    priority: 4
  - class: moose
    notify: riistanvartija
    priority: 3
- table_id: TBL_TARGET_PRIORITY
  title: Kohteiden priorisointi
  rows:
  - priority: 1
    class: person, bear
    behavior: Lukitse, zoomaa, seuraa poistumiseen
  - priority: 2
    class: deer, fox, dog
    behavior: Seuraa yleiskuvassa, ei aggressiivista zoomia
  - priority: 3
    class: bird, cat
    behavior: Tallenna, ei kameran siirtoa jos > 30° käännös
COMPLIANCE_AND_LEGAL:
- 'RL 24:6 (Salakatselu): PTZ-kameran ohjaus ja tallennus eivät saa kohdistua naapurin piha-alueelle tai julkiselle tielle
  ilman tietosuojaselostetta [src:LAW1].'
- Luonnonsuojelulaki 9/2023 kieltää rauhoitettujen eläinten tahallisen häirinnän pesimäaikana.
UNCERTAINTY_NOTES:
- YOLO-mallin tarkkuus suomalaisille eläinlajeille vaihtelee — hirvi/karhu hyvä (>90%), pienet linnut heikko (<60%).
- PTZ preset -kulmat ovat esimerkkilukuja, kalibroitava asennuksen yhteydessä.
SOURCE_REGISTRY:
  sources:
  - id: src:LK1
    org: ONVIF / IP-kameravalmistajat
    title: PTZ Camera Best Practices
    year: 2025
    url: https://www.onvif.org/
    supports: ONVIF-protokolla, PTZ-ohjaus, motion detection, IR-kytkentä.
  - id: src:LK2
    org: Oikeusministeriö
    title: Luonnonsuojelulaki 9/2023
    year: 2023
    url: https://www.finlex.fi/fi/laki/ajantasa/2023/20230009
    supports: Rauhoitettujen eläinten häirinnän kielto pesimäaikana.
  - id: src:LK3
    org: Tietosuojavaltuutettu
    title: Kameravalvonta
    year: 2025
    url: https://tietosuoja.fi/kameravalvonta
    supports: Yksityisyydensuoja kameravalvonnassa.
  - id: src:LAW1
    org: Finlex
    title: 'Rikoslaki: Salakatselu (RL 24:6)'
    year: 1997
    url: https://www.finlex.fi/fi/hallituksen-esitykset/1997/239
    supports: Salakatselun sisältö ja yksityisyyden suoja.
  - id: src:PTZ1
    org: ONVIF
    title: ONVIF Profile S and T Specifications
    year: 2024
    url: https://www.onvif.org/profiles/
    supports: PTZ absoluuttinen/suhteellinen ohjaus. Ei numeerisia viivevaatimuksia.
  - id: src:PTZ2
    org: Frigate
    title: Frigate NVR Documentation
    year: 2025
    url: https://docs.frigate.video/
    supports: Objektien tunnistus, confidence, autotracking. Ei pakollisia kynnysarvoja.
