capabilities:
  - id: solve.thermal
    category: SOLVE
    description: "Physics-based thermal calculations (heat loss, frost risk, COP)"
    preconditions:
      - "numeric inputs available"
    success_criteria:
      - "thermal result computed and validated"
    rollback_possible: true
    max_latency_ms: 100
    trust_baseline: 0.95

  - id: solve.stats
    category: SOLVE
    description: "Statistical analysis and time-series summarization"
    preconditions: []
    success_criteria:
      - "summary or comparison computed"
    rollback_possible: true
    max_latency_ms: 200
    trust_baseline: 0.90

  - id: solve.causal
    category: SOLVE
    description: "Causal chain discovery and impact analysis"
    preconditions: []
