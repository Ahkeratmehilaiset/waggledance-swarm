name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unified:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libvoikko1 voikko-fi

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Compile all Python files
      run: |
        python -m compileall core memory web waggledance backend integrations tests -q

    - name: Run legacy tests
      run: |
        python tests/run_all.py --skip-ollama

    - name: Run pytest — unit, core, app, contracts
      run: |
        python -m pytest tests/unit/ tests/unit_core/ tests/unit_app/ tests/contracts/ -v --tb=short

    - name: Run pytest — integration
      run: |
        python -m pytest tests/integration/ -v --tb=short
